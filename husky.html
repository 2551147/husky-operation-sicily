function logEvent(msg, level) {
  // Auto-categorize by emoji prefix if level not explicitly given
  let lvl = level || 'info';
  if (!level) {
    if (msg.startsWith('⚔')) lvl = 'combat';
    else if (msg.startsWith('⚠') || msg.startsWith('💀') || msg.startsWith('❌')) lvl = 'warning';
    else if (msg.startsWith('🏴') || msg.startsWith('🏆') || msg.startsWith('🎉')) lvl = 'victory';
    else if (msg.startsWith('═══') || msg.startsWith('════')) lvl = 'phase';
    else if (msg.startsWith('🔄') || msg.startsWith('🪖') || msg.startsWith('📋')) lvl = 'phase';
  }
  eventLog.unshift({msg, lvl});
  if (eventLog.length > 200) eventLog.pop();
  const colors = {info:'#888', combat:'#e74c3c', warning:'#f39c12', victory:'#2ecc71', phase:'#85c1e9'};
  const display = eventLog.slice(0, 4).map(e=>`<span style="color:${colors[e.lvl]||'#888'}">${e.msg}</span>`).join(' <span style="color:#555">|</span> ');
  document.getElementById('log').innerHTML = display || '就绪';
}

// ==============================
//  TURN SYSTEM (WEGO)
// ==============================
function startTurn() {
  currentPhase = PHASE.DEPLOY_UK;
  currentPlayer = PLAYER.UK;

  // Reset all units for new turn
  for (let id in units) {
    const u = units[id];
    u.hasMoved = false;
    u.hasFought = false;
    u.order = null;
  }
  unitOrders = {};
  selectedUnitId = null;
  pendingOrder = null;
  selectedActionType = ACTION_TYPE.MOVE;

  // Calculate reinforcement points based on supply
  const supUK = getSupplyValue(PLAYER.UK);
  const supDE = getSupplyValue(PLAYER.GERMANY);
  reinfPoints[PLAYER.UK] = Math.max(1, Math.floor(supUK / 3));
  reinfPoints[PLAYER.GERMANY] = Math.max(1, Math.floor(supDE / 3));

  // Special effect: onTurnStart for all controlled capture points
  for (let cp of capturePoints) {
    const cph = getHex(cp.q, cp.r);
    if (!cph) continue;
    const effect = getCPEffect(cp);
    if (effect && effect.onTurnStart && cph.owner !== PLAYER.NONE) {
      effect.onTurnStart(cph.owner);
    }
  }

  updateAll();
  logEvent(`═════ 第 ${currentTurn} 回合开始 ═════`);
  logEvent(`英军兵力点:${reinfPoints[PLAYER.UK]} 德军兵力点:${reinfPoints[PLAYER.GERMANY]}`);
  logEvent('英军部署阶段: 在己方占领点(蓝方块)点击部署增援');
}

function endDeployUK() {
  if (currentPhase !== PHASE.DEPLOY_UK) return;
  var rp = reinfPoints[PLAYER.UK] || 0;
  if (rp > 0 && !isAIPhase() && !confirm('还有 '+rp+' 点兵力未使用，确定结束部署？\n未使用的兵力点将会作废。')) {
    return;
  }
  selectedUnitId = null; pendingOrder = null; selectedCardUid = null;
  logEvent('英军部署完毕。');
  var nextLabel = isAIPhase() ? '🤖 AI德军' : '🇩🇪 德军玩家';
  showTransitionScreen('🇬🇧 英军部署完成', '请将操作权交给 '+nextLabel, function(){
    currentPhase = PHASE.DEPLOY_DE;
    currentPlayer = PLAYER.GERMANY;
    updateAll();
    if (isAIPhase()) setTimeout(triggerAI, 500);
  });
}

function endDeployDE() {
  if (currentPhase !== PHASE.DEPLOY_DE) return;
  var rp = reinfPoints[PLAYER.GERMANY] || 0;
  if (rp > 0 && !isAIPhase() && !confirm('还有 '+rp+' 点兵力未使用，确定结束部署？\n未使用的兵力点将会作废。')) {
    return;
  }
  selectedUnitId = null; pendingOrder = null; selectedCardUid = null;
  logEvent('德军部署完毕。');
  var nextLabel = isAIPhase() ? '🤖 AI英军' : '🇬🇧 英军玩家';
  showTransitionScreen('🇩🇪 德军部署完成', '请将操作权交给 '+nextLabel, function(){
    currentPhase = PHASE.ORDERS_UK;
    currentPlayer = PLAYER.UK;
    unitOrders = {};
    updateAll();
    if (isAIPhase()) setTimeout(triggerAI, 500);
  });
}

function endOrdersUK() {
  if (currentPhase !== PHASE.ORDERS_UK) return;
  // Warn if units have no orders
  var pendingUnits = countUnitsWithoutOrders(PLAYER.UK);
  if (pendingUnits > 0 && !isAIPhase() && !confirm(pendingUnits+' 个英军单位未下令，确定继续？\n未下令单位将原地待命。')) {
    return;
  }
  selectedUnitId = null; pendingOrder = null; selectedCardUid = null;
  logEvent('英军命令下达完毕。');
  var nextLabel = isAIPhase() ? '🤖 AI德军' : '🇩🇪 德军玩家';
  showTransitionScreen('🇬🇧 英军下令完成', '请将操作权交给 '+nextLabel, function(){
    currentPhase = PHASE.ORDERS_DE;
    currentPlayer = PLAYER.GERMANY;
    updateAll();
    if (isAIPhase()) setTimeout(triggerAI, 500);
  });
}

function endOrdersDE() {
  if (currentPhase !== PHASE.ORDERS_DE) return;
  var pendingUnits = countUnitsWithoutOrders(PLAYER.GERMANY);
  if (pendingUnits > 0 && !isAIPhase() && !confirm(pendingUnits+' 个德军单位未下令，确定执行回合？\n未下令单位将原地待命。')) {
    return;
  }
  selectedUnitId = null; pendingOrder = null; selectedCardUid = null;
  resolveTurn();
}

function countUnitsWithoutOrders(player) {
  var count = 0;
  for (var id in units) {
    var u = units[id];
    if (u.owner === player && u.equip > 0 && !unitOrders[id]) count++;
  }
  return count;
}

function showTransitionScreen(title, subtitle, callback) {
  const screen = document.getElementById('transition-screen');
  document.getElementById('transition-msg').textContent = title;
  document.getElementById('transition-sub').textContent = subtitle + ' — 点击继续';
  screen.style.display = 'flex';
  function handler() {
    screen.style.display = 'none';
    screen.removeEventListener('click', handler);
    document.removeEventListener('keydown', keyHandler);
    if (callback) callback();
  }
  function keyHandler(e) {
    if (e.key === 'Enter' || e.key === ' ') handler();
  }
  screen.addEventListener('click', handler);
  document.addEventListener('keydown', keyHandler);
}

//  TURN STATS COLLECTION
// ==============================
function initTurnStats() {
  turnStats = {
    turn: currentTurn,
    moves: [],        // {side, name, fromQ, fromR, toQ, toR, action}
    attacks: [],      // {side, atkName, defName, atkTotal, defTotal, result, atkLossEquip, atkLossOrg, defLossEquip, defLossOrg, defKilled, cpTaken}
    eliminations: [], // {side, name, killedBy}
    routs: [],        // {side, name}
    cpChanges: [],    // {name, prevOwner, newOwner}
  };
}

function showTurnStats() {
  var st = turnStats;
  if (!st) { startTurn(); return; }

  // Determine viewer based on game mode (NOT getViewer(), which returns NONE during RESOLVE)
  var viewer = PLAYER.NONE;
  if (gameMode === GAME_MODE.UK_VS_AI) viewer = PLAYER.UK;
  else if (gameMode === GAME_MODE.AI_VS_DE) viewer = PLAYER.GERMANY;
  // Determine which side is the human (in hotseat, both sides are "own")
  var ownSide = (viewer === PLAYER.NONE) ? 'both' : (viewer === PLAYER.UK ? 'uk' : 'de');

  function isOwnSide(side) {
    if (ownSide === 'both') return true;
    return side === ownSide;
  }

  function canSee(side, q, r) {
    // Always show own-side actions; for enemy, check FOW
    if (isOwnSide(side)) return true;
    if (viewer === PLAYER.NONE) return true;
    return isHexVisible(q, r, viewer);
  }

  function sideLabel(side) { return side==='uk' ? '🇬🇧 英军' : '🇩🇪 德军'; }
  function buildSection(side) {
    var moves = st.moves.filter(function(m){return m.side===side && (canSee(m.side, m.toQ, m.toR) || canSee(m.side, m.fromQ, m.fromR));});
    var attacks = st.attacks.filter(function(a){return a.side===side && canSee(a.side, a.q, a.r);});
    var elims = st.eliminations.filter(function(e){return e.side===side && canSee(e.side, e.q, e.r);});
    var routs = st.routs.filter(function(r){return r.side===side && canSee(r.side, r.q, r.r);});
    var cps = st.cpChanges.filter(function(c){return c.newOwner===(side==='uk'?1:2) && canSee(side, c.q||0, c.r||0);});

    var html = '';
    // Moves
    html += '<div class="stat-block"><div class="label">🚶 移动</div>';
    if (moves.length===0) html += '<div class="stat-empty">无移动</div>';
    else for (var i=0;i<moves.length;i++) {
      var m = moves[i];
      var actName = {move:'移动',forcedMarch:'⚡急行军',rapidWithdraw:'🏃撤退',advance_fire:'🔫移动射击',overrun:'💥突袭'}[m.action]||m.action;
      html += '<div class="item">'+m.name+' '+actName+' →('+m.toQ+','+m.toR+')</div>';
    }
    html += '</div>';

    // Attacks
    html += '<div class="stat-block"><div class="label">⚔ 攻击</div>';
    if (attacks.length===0) html += '<div class="stat-empty">无攻击</div>';
    else for (var i2=0;i2<attacks.length;i2++) {
      var a = attacks[i2];
      var killTag = a.defKilled ? ' 💀消灭' : '';
      var cpTag = a.cpTaken ? ' 🏴占点' : '';
      html += '<div class="item">'+a.atkName+' → '+a.defName+' <span style="color:#f1c40f">'+a.result+'</span> ('+a.atkTotal+' vs '+a.defTotal+')'+(a.isAdvanceFire?' <span style="color:#e74c3c">🔫半攻</span>':'')+killTag+cpTag+'</div>';
    }
    html += '</div>';

    // Losses
    html += '<div class="stat-block"><div class="label" style="color:#e74c3c">💀 损失</div>';
    var losses = [];
    for (var i3=0;i3<elims.length;i3++) { losses.push(elims[i3].name+' (被'+elims[i3].killedBy+'消灭)'); }
    for (var i4=0;i4<routs.length;i4++) { losses.push(routs[i4].name+' (溃退)'); }
    if (losses.length===0) html += '<div class="stat-empty">无损失</div>';
    else for (var i5=0;i5<losses.length;i5++) {
      html += '<div class="item" style="color:#e74c3c">'+losses[i5]+'</div>';
    }
    html += '</div>';

    // CP changes
    if (cps.length>0) {
      html += '<div class="stat-block"><div class="label">🏴 占领据点</div>';
      for (var i6=0;i6<cps.length;i6++) {
        html += '<div class="item" style="color:#f1c40f">'+cps[i6].name+'</div>';
      }
      html += '</div>';
    }

    if (moves.length===0 && attacks.length===0 && elims.length===0 && routs.length===0 && cps.length===0) {
      return '<div class="stat-empty" style="text-align:center;padding:12px">本回合无行动</div>';
    }
    return html;
  }

  var ukHtml = buildSection('uk');
  var deHtml = buildSection('de');

  var card = document.getElementById('stats-card');
  card.innerHTML =
    '<h2>📊 第 '+st.turn+' 回合战报</h2>'+
    '<div class="stats-cols">'+
      '<div class="stats-col uk"><h3>🇬🇧 英军</h3>'+ukHtml+'</div>'+
      '<div class="stats-col de"><h3>🇩🇪 德军</h3>'+deHtml+'</div>'+
    '</div>'+
    '<button class="btn-continue" id="btn-stats-ok">✓ 继续下一回合</button>';

  var screen = document.getElementById('stats-screen');
  screen.style.display = 'flex';

  function dismiss() {
    screen.style.display = 'none';
    document.getElementById('btn-stats-ok').removeEventListener('click', dismiss);
    document.removeEventListener('keydown', keyHandler);
    startTurn();
  }
  function keyHandler(e) {
    if (e.key==='Enter' || e.key===' ') dismiss();
  }
  document.getElementById('btn-stats-ok').addEventListener('click', dismiss);
  document.addEventListener('keydown', keyHandler);
}

// ==============================
//  COMBAT RESOLUTION
// ==============================
function resolveTurn() {
  initTurnStats();
  currentPhase = PHASE.RESOLVE;
  currentPlayer = PLAYER.NONE;
  updateAll();
  logEvent('⚡ ═════ 执行回合决议 ═════ ⚡');

  // Collect all orders from both sides
  const allOrders = [];
  for (let id in unitOrders) {
    allOrders.push({unitId: id, ...unitOrders[id]});
  }

  // Sort: moves first (by unit speed), then attacks
  const moveOrders = allOrders.filter(o=>o.type==='move');
  const attackOrders = allOrders.filter(o=>o.type==='attack');

  const combatResults = [];
  const movesExecuted = [];

  // Phase 1: Execute all movements
  for (let order of moveOrders) {
    const unit = getUnit(order.unitId);
    if (!unit || unit.equip <= 0) continue;
    const fromH = getHex(unit.q, unit.r);

    // For advance-fire: move to staging position, then queue attack
    if (order.actionType === ACTION_TYPE.ADVANCE_FIRE && order.attackTargetId && order.path && order.path.length > 1) {
      const dest = order.path[order.path.length-1];
      if (fromH && fromH.unitId === unit.id) fromH.unitId = null;
      unit.q = dest.q; unit.r = dest.r;
      const toH = getHex(dest.q, dest.r);
      if (toH) { toH.unitId = unit.id; toH.owner = unit.owner; }
      unit.hasMoved = true;
      logEvent(`→ ${unit.name} 移动至 (${dest.q},${dest.r}) [移动射击]`);
      if (turnStats) turnStats.moves.push({side: unit.owner===1?'uk':'de', name:unit.name, fromQ:fromH.q, fromR:fromH.r, toQ:dest.q, toR:dest.r, action:'advance_fire'});
      // Queue the attack
      const defUnit = getUnit(order.attackTargetId);
      if (defUnit && defUnit.equip > 0) {
        combatResults.push({
          atkUnitId: unit.id, defUnitId: order.attackTargetId,
          q: order.attackTargetQ, r: order.attackTargetR, isOverrun: false, isAdvanceFire: true
        });
      }
      continue;
    }

    const path = order.path || findPath(order.fromQ, order.fromR, order.toQ, order.toR, unit);
    if (path && path.length > 1) {
      const dest = path[path.length-1];
      const fromH = getHex(unit.q, unit.r);
      const toH = getHex(dest.q, dest.r);
      if (!toH || toH.terrain.imp) continue;

      const enemyAtDest = getUnitAt(dest.q, dest.r);
      if (enemyAtDest && enemyAtDest.owner !== unit.owner) {
        // Movement blocked by enemy — convert to overrun combat
        // Apply action-specific effects before overrun
        const act = order.actionType || ACTION_TYPE.MOVE;
        let actTag2 = '';
        if (act === ACTION_TYPE.FORCED_MARCH) {
          unit.equip = Math.max(0, unit.equip - 1);
          unit.org = Math.max(0, unit.org - 15);
          actTag2 = '[急行军] -1装 -15组';
        } else if (act === ACTION_TYPE.MOVE) {
          unit.org = Math.min(unit.maxOrg, unit.org + 5);
          actTag2 = '[移动] +5组';
        } else if (act === ACTION_TYPE.RAPID_WITHDRAW) {
          unit.org = Math.max(0, unit.org - 25);
          actTag2 = '[快速撤退] -25组';
        }
        unit.hasMoved = true;
        combatResults.push({
          atkUnitId: unit.id, defUnitId: enemyAtDest.id,
          q: dest.q, r: dest.r, isOverrun: true
        });
        logEvent(`→ ${unit.name} 冲撞敌军 (${dest.q},${dest.r}) ${actTag2} [转为近战]`);
        if (turnStats) turnStats.moves.push({side: unit.owner===1?'uk':'de', name:unit.name, fromQ:fromH.q, fromR:fromH.r, toQ:dest.q, toR:dest.r, action:'overrun'});
        if (unit.equip <= 0) { removeUnit(unit.id); logEvent(`  💀${unit.name}急行军覆灭`); if (turnStats) turnStats.eliminations.push({side: unit.owner===1?'uk':'de', name: unit.name, killedBy: '急行军冲撞损耗', q: fromH.q, r: fromH.r}); }
        if (unit.org <= 0) { removeUnit(unit.id); logEvent(`  💀${unit.name}溃散覆灭`); if (turnStats && unit.equip > 0) turnStats.eliminations.push({side: unit.owner===1?'uk':'de', name: unit.name, killedBy: '冲撞溃散', q: fromH.q, r: fromH.r}); }
      } else if (!enemyAtDest || enemyAtDest.owner === unit.owner) {
        // Execute move
        if (fromH && fromH.unitId === unit.id) fromH.unitId = null;
        unit.q = dest.q; unit.r = dest.r;
        if (toH) {
          toH.unitId = unit.id;
          if (toH.owner === PLAYER.NONE || toH.owner !== unit.owner) toH.owner = unit.owner;
        }
        unit.hasMoved = true;
        movesExecuted.push({unit, path, destQ: dest.q, destR: dest.r});

        // ---- Apply action-specific effects ----
        const act = order.actionType || ACTION_TYPE.MOVE;
        let actTag = '';
        if (act === ACTION_TYPE.FORCED_MARCH) {
          unit.equip = Math.max(0, unit.equip - 1);
          unit.org = Math.max(0, unit.org - 15);
          actTag = '[急行军] -1装 -15组';
          if (unit.equip <= 0) { removeUnit(unit.id); actTag += ' 💀覆灭'; if (turnStats) turnStats.eliminations.push({side: unit.owner===1?'uk':'de', name: unit.name, killedBy: '急行军损耗', q: unit.q, r: unit.r}); }
        } else if (act === ACTION_TYPE.MOVE) {
          unit.org = Math.min(unit.maxOrg, unit.org + 5);
          actTag = '[移动] +5组';
        } else if (act === ACTION_TYPE.RAPID_WITHDRAW) {
          unit.org = Math.max(0, unit.org - 25);
          actTag = '[快速撤退] -25组';
          if (unit.org <= 0) { removeUnit(unit.id); actTag += ' 💀覆灭'; if (turnStats) turnStats.eliminations.push({side: unit.owner===1?'uk':'de', name: unit.name, killedBy: '快速撤退溃散', q: unit.q, r: unit.r}); }
        }
        logEvent(`→ ${unit.name} 移动至 (${dest.q},${dest.r}) ${actTag}`);
        if (turnStats) turnStats.moves.push({side: unit.owner===1?'uk':'de', name:unit.name, fromQ:fromH.q, fromR:fromH.r, toQ:dest.q, toR:dest.r, action:act});
      }
    }
  }

  // Phase 2: Execute all attacks
  for (let order of attackOrders) {
    const atkUnit = getUnit(order.unitId);
    const defUnit = getUnit(order.targetId);
    if (!atkUnit || atkUnit.equip <= 0) continue;
    if (!defUnit || defUnit.equip <= 0) continue;
    combatResults.push({
      atkUnitId: atkUnit.id, defUnitId: defUnit.id,
      q: order.toQ, r: order.toR, isOverrun: false
    });
  }

  // Phase 3: Resolve all combats
  for (let cr of combatResults) {
    resolveCombat(cr);
  }

  // Phase 4: Supply and attrition
  calculateSupply();
  applyAttrition();

  // Phase 5: Org recovery for idle units + rout recovery
  for (let id in units) {
    const u = units[id];
    if (u.equip <= 0) continue;
    if (u.routed) {
      // Routed units recover very slowly, auto-recover at 50%
      u.org = Math.min(u.maxOrg, u.org + 5);
      if (u.org >= u.maxOrg * 0.5) {
        u.routed = false;
        logEvent(`  ✅ ${u.name} 恢复士气`);
      }
    } else if (!u.hasMoved && !u.hasFought) {
      u.org = Math.min(u.maxOrg, u.org + (u.isSupplied ? 15 : 5));
    }
  }

  // Phase 6: Consolidate territory
  consolidateTerritory();

  // Clear turn-based card effects
  clearTurnCards();

  // Phase 7: Victory check
  if (checkVictory()) return;

  // Next turn
  currentTurn++;
  if (currentTurn > MAX_TURNS) {
    endGameByPoints();
    return;
  }
  showTurnStats();
}

// ==============================
//  COMBAT RESOLUTION (v3 — 2d6, soft/hard attack, 6-level results table, rout)
// ==============================
function resolveCombat(cr) {
  const atkUnit = getUnit(cr.atkUnitId);
  const defUnit = getUnit(cr.defUnitId);
  if (!atkUnit || !defUnit) return;
  // Routed units cannot attack
  if (atkUnit.routed) { logEvent(`  ⚠ ${atkUnit.name} 溃退中,无法攻击`); return; }

  const atkType = getUnitType(atkUnit);
  const defType = getUnitType(defUnit);
  const h = getHex(cr.q, cr.r);
  const terrainDef = h ? h.terrain.def : 0;

  // Check for special effects on defender's hex
  const defCP = capturePoints.find(cp=>cp.q===defUnit.q && cp.r===defUnit.r);
  const defEffect = defCP ? getCPEffect(defCP) : null;

  // Check for special effects on attacker's hex
  const atkCP = capturePoints.find(cp=>cp.q===atkUnit.q && cp.r===atkUnit.r);
  const atkEffect = atkCP ? getCPEffect(atkCP) : null;

  // ---- ATTACKER POWER ----
  // Use softAtk vs infantry/eng/recon, hardAtk vs armor
  const isHardTarget = defType.id === 'arm';
  let atkPower = isHardTarget ? atkType.hardAtk : atkType.softAtk;
  // Org affects combat effectiveness
  const orgRatioAtk = atkUnit.org / atkUnit.maxOrg;
  if (orgRatioAtk < 0.5) atkPower = Math.floor(atkPower * 0.7);
  if (orgRatioAtk < 0.25) atkPower = Math.floor(atkPower * 0.5);
  // Supply penalty
  if (!atkUnit.isSupplied) atkPower = Math.floor(atkPower * 0.6);
  // Combined arms: friendly artillery within 2 hexes, +2 (deduplicated)
  const artySeen = new Set();
  const atkNeighbors = hexNeighbors(atkUnit.q, atkUnit.r);
  let nearbyArty = false;
  for (let n of atkNeighbors) {
    const u = getUnitAt(n.q, n.r);
    const nk = hexKey(n.q, n.r);
    if (u && u.owner === atkUnit.owner && u.typeId === 'art' && u.org > 30 && !artySeen.has(nk)) {
      artySeen.add(nk); nearbyArty = true;
    }
  }
  if (!nearbyArty) {
    for (let n of atkNeighbors) {
      for (let n2 of hexNeighbors(n.q, n.r)) {
        const nk2 = hexKey(n2.q, n2.r);
        if (artySeen.has(nk2)) continue;
        const u = getUnitAt(n2.q, n2.r);
        if (u && u.owner === atkUnit.owner && u.typeId === 'art' && u.org > 30) {
          artySeen.add(nk2); nearbyArty = true;
        }
      }
    }
  }
  if (nearbyArty && atkType.id !== 'art') atkPower += 2;

  // Special: 琴图里佩 — +3 attack dice toward Catania
  let atkDiceBonus = 0;
  if (atkEffect && atkEffect.attackDiceBonus) {
    atkDiceBonus += atkEffect.attackDiceBonus(atkUnit, cr.q, cr.r);
  }
  // Tactical card: attack dice bonuses (air support, artillery barrage)
  atkDiceBonus += getActiveEffectVal(atkUnit.owner, 'attackDice');
  // Tactical card: defender smoke cover — reduce attacker's dice
  if (hasActiveEffect(defUnit.owner, 'defenseDice')) {
    atkDiceBonus -= getActiveEffectVal(defUnit.owner, 'defenseDice');
  }

  // Advance fire penalty: move + shoot = half attack power
  if (cr.isAdvanceFire) atkPower = Math.floor(atkPower * 0.5);
  // Tactical card: unit attack bonus (raid orders)
  if (unitCardBuffs[atkUnit.id] && unitCardBuffs[atkUnit.id].atkBonus) {
    atkPower += unitCardBuffs[atkUnit.id].atkBonus;
  }

  // ---- DEFENDER POWER ----
  let defPower = defType.def + Math.max(0, terrainDef) * 2;
  // Routed defender penalty
  if (defUnit.routed) defPower -= 3;
  // Org penalty
  if (defUnit.org < 30) defPower = Math.floor(defPower * 0.7);
  // Supply penalty
  if (!defUnit.isSupplied) defPower = Math.floor(defPower * 0.6);
  // Entrenched engineer
  if (defType.id === 'eng' && (h?.terrain.id===5 || h?.terrain.id===7)) defPower += 2;
  // Forest cover
  if (h && h.forest) defPower += 1;

  // Special: defender bonuses (Troina +2def, Ragusa +1def)
  let defOrgSavePct = 0;
  let defDefBonus = 0;
  if (defEffect) {
    if (defEffect.defenderDefBonus) defDefBonus += defEffect.defenderDefBonus;
    if (defEffect.defenderOrgSave) defOrgSavePct = defEffect.defenderOrgSave;
  }
  defPower += defDefBonus;
  // Tactical card: unit defense bonus (fortifications)
  if (unitCardBuffs[defUnit.id] && unitCardBuffs[defUnit.id].defBonus) {
    defPower += unitCardBuffs[defUnit.id].defBonus;
  }

  // River crossing: attacking across a river edge gives defender +2 defense
  if (hexDistance(atkUnit.q, atkUnit.r, defUnit.q, defUnit.r) <= 1
      && hasRiverEdge(atkUnit.q, atkUnit.r, defUnit.q, defUnit.r)
      && !hasActiveEffect(atkUnit.owner, 'riverRoad')) {
    defPower += 2;
  }

  // Special: 卡塔尼亚 — DE defender Org+20%
  let defenderOrgMult = 1.0;
  if (defEffect && defEffect.defenderOrgBonus) {
    defenderOrgMult = 1.0 + defEffect.defenderOrgBonus(defUnit.owner);
  }

  // ---- ARTILLERY DEFENSIVE FIRE ----
  // Friendly artillery within 2 hexes provides +2 def support, expends 5 org
  let artySupport = 0, artySupportUnit = null;
  const defNeighbors2 = hexNeighbors(defUnit.q, defUnit.r).concat(
    hexNeighbors(defUnit.q, defUnit.r).flatMap(n=>hexNeighbors(n.q, n.r))
  );
  const artyChecked = new Set();
  for (let n of defNeighbors2) {
    const nk = hexKey(n.q, n.r);
    if (artyChecked.has(nk)) continue;
    artyChecked.add(nk);
    // Skip defender's own hex
    if (n.q === defUnit.q && n.r === defUnit.r) continue;
    const au = getUnitAt(n.q, n.r);
    if (au && au.owner === defUnit.owner && au.typeId === 'art' && au.org > 30 && !au.routed) {
      artySupport = 2;
      artySupportUnit = au;
      break; // only one artillery provides defensive support
    }
  }
  if (artySupport > 0 && artySupportUnit) {
    defPower += artySupport;
    artySupportUnit.org = Math.max(0, artySupportUnit.org - 5);
    // Don't log individual support events during multi-combat resolution (too noisy)
    // The combat log line already includes defPower changes
  }

  // ---- 2D6 DICE ROLLS ----
  const atkRoll = roll2d6() + atkDiceBonus;
  const defRoll = roll2d6();
  const atkTotal = atkPower + atkRoll;
  const defTotal = defPower + defRoll;
  const diff = atkTotal - defTotal;

  // ---- 6-LEVEL COMBAT RESULTS TABLE ----
  const RESULT_TABLE = {
    devastating:  {min:6,  label:'💥毁灭打击', equipDmgA:0, equipDmgD:(d)=>Math.max(2,Math.floor(d/2)),
                   orgDmgA:(d,dr)=>Math.max(1,Math.floor(dr/4)),
                   orgDmgD:(d,dr)=>Math.max(15,Math.floor(d*1.8))},
    solid:        {min:3,  label:'💢重创',     equipDmgA:0, equipDmgD:(d)=>Math.max(1,Math.floor(d/3)),
                   orgDmgA:(d,dr)=>Math.max(2,Math.floor(dr/4)),
                   orgDmgD:(d,dr)=>Math.max(10,Math.floor(d*1.5))},
    hit:          {min:0,  label:'⚡命中',     equipDmgA:0, equipDmgD:1,
                   orgDmgA:(d,dr)=>Math.max(3,Math.floor(dr/3)),
                   orgDmgD:(d,dr)=>Math.max(5,Math.floor(d*1.2)+5)},
    stalemate:    {min:-3, label:'↔️僵持',     equipDmgA:1, equipDmgD:1,
                   orgDmgA:(d,dr)=>Math.max(3,Math.floor(Math.abs(d)*0.5)+3),
                   orgDmgD:(d,dr)=>Math.max(3,Math.floor(Math.abs(d)*0.5)+3)},
    repulsed:     {min:-6, label:'🔙击退',     equipDmgA:(d)=>Math.max(2,Math.floor(Math.abs(d)/3)), equipDmgD:0,
                   orgDmgA:(d,dr)=>Math.max(10,Math.floor(Math.abs(d)*1.5)),
                   orgDmgD:(d,dr)=>Math.max(2,Math.floor(Math.abs(d)*0.3))},
    counterattack:{min:-99,label:'💀反攻',     equipDmgA:(d)=>Math.max(3,Math.floor(Math.abs(d)/2)), equipDmgD:0,
                   orgDmgA:(d,dr)=>Math.max(15,Math.floor(Math.abs(d)*2.0)),
                   orgDmgD:(d,dr)=>Math.max(1,Math.floor(Math.abs(d)*0.2))},
  };

  // Find which result level applies
  let resultLevel = 'counterattack'; // default worst case
  for (let key of ['devastating','solid','hit','stalemate','repulsed','counterattack']) {
    if (diff >= RESULT_TABLE[key].min) { resultLevel = key; break; }
  }
  const res = RESULT_TABLE[resultLevel];

  // Calculate damage
  let equipDmgA = typeof res.equipDmgA === 'function' ? res.equipDmgA(diff) : res.equipDmgA;
  const equipDmgD = typeof res.equipDmgD === 'function' ? res.equipDmgD(diff) : res.equipDmgD;
  let orgDmgA = res.orgDmgA(diff, defRoll);
  let orgDmgD = res.orgDmgD(diff, defRoll);
  // Apply defender org save (e.g. Troina: -50%)
  orgDmgD = Math.floor(orgDmgD * (1 - defOrgSavePct));
  // Apply defender org multiplier (e.g. Catania: DE +20%)
  if (defenderOrgMult > 1.0) orgDmgD = Math.floor(orgDmgD / defenderOrgMult);

  // Artillery firing from 2 hexes away: no counterattack damage
  if (atkType.id === 'art' && hexDistance(atkUnit.q, atkUnit.r, defUnit.q, defUnit.r) >= 2) {
    equipDmgA = 0;
    orgDmgA = 0;
  }

  // Apply damage
  atkUnit.equip = Math.max(0, atkUnit.equip - equipDmgA);
  atkUnit.org = Math.max(0, atkUnit.org - orgDmgA);
  defUnit.equip = Math.max(0, defUnit.equip - equipDmgD);
  defUnit.org = Math.max(0, defUnit.org - orgDmgD);
  atkUnit.hasFought = true;
  defUnit.hasFought = true;

  // Build bonus tags for log
  let bonusTags = [];
  if (atkDiceBonus) bonusTags.push(`攻方+${atkDiceBonus}骰`);
  if (defDefBonus) bonusTags.push(`守方+${defDefBonus}防`);
  if (defOrgSavePct > 0) bonusTags.push(`守方护盾${Math.round(defOrgSavePct*100)}%`);
  if (defenderOrgMult > 1.0) bonusTags.push(`守方Org×${defenderOrgMult.toFixed(1)}`);
  if (artySupport > 0) bonusTags.push(`炮兵支援+${artySupport}`);
  if (atkUnit.routed) bonusTags.push('攻方溃退');
  if (defUnit.routed) bonusTags.push('守方溃退');
  if (atkType.id === 'art' && hexDistance(atkUnit.q, atkUnit.r, defUnit.q, defUnit.r) >= 2) bonusTags.push('远程射击无反击');
  const bonusStr = bonusTags.length > 0 ? ` [${bonusTags.join(',')}]` : '';

  logEvent(`⚔ ${atkType.icon}${atkUnit.name}(${atkTotal}) vs ${defType.icon}${defUnit.name}(${defTotal}) [${h?h.terrain.name:''}]${bonusStr}`);

  let resultTags = [];
  if (equipDmgD > 0) resultTags.push(`守-${equipDmgD}装`);
  if (orgDmgD > 0) resultTags.push(`守-${orgDmgD}组`);
  if (equipDmgA > 0) resultTags.push(`攻-${equipDmgA}装`);
  if (orgDmgA > 0) resultTags.push(`攻-${orgDmgA}组`);
  let resultText = `${res.label} [${resultTags.join(' ')}]`;

  // ---- DESTROY CHECK (org <= 0 or equip <= 0) ----
  // Defender destroyed
  if (defUnit.equip <= 0 || defUnit.org <= 0) {
    resultText += ` 💀${defUnit.name}覆灭`;
    const dh = getHex(defUnit.q, defUnit.r);
    const defQ = defUnit.q, defR = defUnit.r;
    removeUnit(defUnit.id);
    if (dh && cr.isOverrun) {
      dh.unitId = atkUnit.id;
      dh.owner = atkUnit.owner;
      atkUnit.q = cr.q; atkUnit.r = cr.r;
      resultText += ` 攻方推进`;
    }
    // Check capture point at destroyed unit's hex
    const cp = capturePoints.find(c=>c.q===defQ && c.r===defR);
    if (cp) {
      const ch = getHex(cp.q, cp.r);
      const prevOwner = ch ? ch.owner : cp.startOwner;
      if (ch) ch.owner = atkUnit.owner;
      resultText += ` 🏴${cp.name}易手!`;
      logEvent(`🏴 ${cp.name} 被 ${atkUnit.owner===PLAYER.UK?'英军':'德军'} 占领!`);
      triggerCaptureEffect(cp, atkUnit.owner, prevOwner);
    }
  }
  // Attacker destroyed (independent check — both sides can be destroyed in same combat)
  if (atkUnit.equip <= 0 || atkUnit.org <= 0) {
    resultText += ` 💀${atkUnit.name}覆灭`;
    removeUnit(atkUnit.id);
  }
  // ---- ROUT CHECK (only if both still alive) ----
  if (units[atkUnit.id] && units[defUnit.id]) {
    // Defender morale check
    if (defUnit.org / defUnit.maxOrg < 0.30) {
      if (!checkMorale(defUnit)) {
        applyRout(defUnit, atkUnit);
        resultText += ` 🏃守方溃退`;
      }
    }
    // Attacker morale check on repulsed/counterattack
    if ((resultLevel === 'counterattack' || resultLevel === 'repulsed') && atkUnit.equip > 0 && atkUnit.org > 0) {
      if (atkUnit.org / atkUnit.maxOrg < 0.30) {
        if (!checkMorale(atkUnit)) {
          applyRout(atkUnit, defUnit);
          resultText += ` 🏃攻方溃退`;
        }
      }
    }
  }

  logEvent(`  ${resultText}`);

  // Collect turn stats
  if (turnStats) {
    var atkSide = atkUnit.owner===1?'uk':'de';
    var defSide = defUnit.owner===1?'uk':'de';
    var defKilled = (defUnit.equip <= 0 || defUnit.org <= 0);
    var atkKilled = (atkUnit.equip <= 0 || atkUnit.org <= 0);
    var cpName = null;
    if (defKilled) {
      var defcp = capturePoints.find(function(c){return c.q===defUnit.q && c.r===defUnit.r;});
      if (defcp) cpName = defcp.name;
    }
    turnStats.attacks.push({
      side: atkSide, atkName: atkUnit.name, defName: defUnit.name,
      atkTotal: atkTotal, defTotal: defTotal,
      result: res.label,
      atkLossEquip: equipDmgA, atkLossOrg: orgDmgA,
      defLossEquip: equipDmgD, defLossOrg: orgDmgD,
      defKilled: defKilled, defSide: defSide,
      cpTaken: cpName, q: defUnit.q, r: defUnit.r,
      isAdvanceFire: cr.isAdvanceFire || false
    });
    if (defKilled) {
      turnStats.eliminations.push({side: defSide, name: defUnit.name, killedBy: atkUnit.name, q: defUnit.q, r: defUnit.r});
      if (cpName) turnStats.cpChanges.push({name: cpName, prevOwner: defSide==='uk'?1:2, newOwner: atkUnit.owner, q: defcp.q, r: defcp.r});
    }
    if (atkKilled) {
      turnStats.eliminations.push({side: atkSide, name: atkUnit.name, killedBy: defUnit.name, q: atkUnit.q, r: atkUnit.r});
    }
    // Routs
    if (resultText.indexOf('守方溃退')>=0) turnStats.routs.push({side: defSide, name: defUnit.name, q: defUnit.q, r: defUnit.r});
    if (resultText.indexOf('攻方溃退')>=0) turnStats.routs.push({side: atkSide, name: atkUnit.name, q: atkUnit.q, r: atkUnit.r});
  }
}

// ---- MORALE CHECK ----
// Returns true if unit holds, false if routs
function checkMorale(unit) {
  if (unit.org <= 0) return false;
  const orgPct = unit.org / unit.maxOrg;
  if (orgPct >= 0.30) return true; // above threshold, no check
  // Roll 2d6, must be <= floor(currentOrg / 5)
  let threshold = Math.max(1, Math.floor(unit.org / 5));
  // Italian units: -1 morale threshold (poor fighting spirit, but not auto-rout)
  if (unit.nation === 'ita') {
    threshold = Math.max(1, threshold - 1);
  }
  const roll = roll2d6();
  const passed = roll <= threshold;
  if (!passed) {
    const nationTag = unit.nation === 'ita' ? '[意军]' : '';
    logEvent(`  💔 [士气] ${nationTag}${unit.name} Org=${unit.org}/${unit.maxOrg} 阈值=${threshold} 掷骰=${roll} ❌溃退`);
  }
  return passed;
}

// ---- ROUT EXECUTION ----
// Retreat 1-2 hexes away from threatUnit, lose 15 Org, mark routed
function applyRout(unit, threatUnit) {
  unit.routed = true;
  // Find valid retreat hex farthest from threat
  let retreatHex = null;
  // First ring
  const dirs1 = hexNeighbors(unit.q, unit.r);
  let bestDist = -1;
  for (let n of dirs1) {
    const nh = getHex(n.q, n.r);
    if (!nh || nh.terrain.imp) continue;
    if (getUnitAt(n.q, n.r)) continue; // occupied
    const dist = hexDistance(n.q, n.r, threatUnit.q, threatUnit.r);
    if (dist > bestDist) { bestDist = dist; retreatHex = n; }
  }
  // Second ring (retreat 2 hexes if possible)
  if (retreatHex) {
    const dirs2 = hexNeighbors(retreatHex.q, retreatHex.r);
    let bestDist2 = -1, secondHex = null;
    for (let n of dirs2) {
      if (n.q === unit.q && n.r === unit.r) continue;
      const nh = getHex(n.q, n.r);
      if (!nh || nh.terrain.imp) continue;
      if (getUnitAt(n.q, n.r)) continue;
      const dist = hexDistance(n.q, n.r, threatUnit.q, threatUnit.r);
      if (dist > bestDist2) { bestDist2 = dist; secondHex = n; }
    }
    if (secondHex) retreatHex = secondHex;
  }

  if (retreatHex) {
    const oldH = getHex(unit.q, unit.r);
    if (oldH && oldH.unitId === unit.id) oldH.unitId = null;
    unit.q = retreatHex.q;
    unit.r = retreatHex.r;
    const newH = getHex(retreatHex.q, retreatHex.r);
    if (newH) { newH.unitId = unit.id; newH.owner = unit.owner; }
  }
  unit.org = Math.max(0, unit.org - 15);
  logEvent(`  🏃 ${unit.name} 溃退至 (${unit.q},${unit.r}) -15组织`);
  // Shatter if org hits 0 during rout
  if (unit.org <= 0) {
    logEvent(`  💀 ${unit.name} 溃散覆灭`);
    removeUnit(unit.id);
  }
}

// Trigger special effect when a capture point changes hands
function triggerCaptureEffect(cp, newOwner, prevOwner) {
  const effect = getCPEffect(cp);
  if (effect && effect.onCapture) {
    effect.onCapture(newOwner, prevOwner);
  }
  // Check for messina instant victory
  if (cp.effect === 'messina' && newOwner === PLAYER.UK) {
    // handled in onCapture
  }
}

// ==============================
//  SUPPLY SYSTEM
// ==============================
function calculateSupply() {
  // Reset all supply levels
  for (let r=0; r<ROWS; r++)
    for (let q=0; q<COLS; q++)
      hexGrid[r][q].supplyLevel = 0;

  // BFS from each controlled capture point
  for (let cp of capturePoints) {
    const h = getHex(cp.q, cp.r);
    if (!h || h.owner === PLAYER.NONE) continue;
    const owner = h.owner;
    const visited = new Set();
    const queue = [{q:cp.q, r:cp.r, dist:0}];
    visited.add(hexKey(cp.q, cp.r));

    // Check for palermo supply radius bonus
    const effect = getCPEffect(cp);
    let maxRange = 14;
    if (effect && effect.supplyRadiusBonus) {
      maxRange += effect.supplyRadiusBonus;
    }
    // Tactical card: escort fleet supply radius bonus
    maxRange += getActiveEffectVal(owner, 'supplyRadius');

    while (queue.length > 0) {
      const {q, r, dist} = queue.shift();
      if (dist > maxRange) continue;
      const ch = getHex(q, r);
      if (ch) {
        const level = Math.max(0.25, 1.0 - dist/maxRange);
        ch.supplyLevel = Math.max(ch.supplyLevel || 0, level);
      }
      if (dist >= maxRange) continue;
      for (let n of hexNeighbors(q, r)) {
        const nh = getHex(n.q, n.r);
        if (!nh || nh.terrain.imp) continue;
        if (nh.owner !== owner) continue;
        const nk = hexKey(n.q, n.r);
        if (visited.has(nk)) continue;
        const stepCost = nh.road ? 0.5 : nh.terrain.mc;
        // Enemy ZOC: supply reaches the hex but cannot extend further
        // Recon units (noZOC) do not project ZOC
        const zocBlocked = hexNeighbors(n.q, n.r).some(n2=>{
          const u2 = getUnitAt(n2.q, n2.r);
          if (!u2 || u2.owner === owner) return false;
          const u2t = getUnitType(u2);
          return !u2t || !u2t.noZOC;
        });
        visited.add(nk);
        const newDist = dist + stepCost;
        if (newDist <= maxRange) {
          const level = Math.max(0.25, 1.0 - newDist/maxRange);
          nh.supplyLevel = Math.max(nh.supplyLevel || 0, level);
        }
        if (!zocBlocked && newDist < maxRange) {
          queue.push({q:n.q, r:n.r, dist:newDist});
        }
      }
    }
  }

  // Update unit supply status
  for (let id in units) {
    const u = units[id];
    const h = getHex(u.q, u.r);
    u.isSupplied = h ? h.supplyLevel >= 0.25 : false;
    // Card: air supply immunity — unit always supplied
    if (!u.isSupplied && unitCardBuffs[id] && unitCardBuffs[id].supplyImmune && unitCardBuffs[id].supplyImmune > 0) {
      u.isSupplied = true;
    }
  }
}

function applyAttrition() {
  for (let id in units) {
    const u = units[id];
    if (!u.isSupplied && u.equip > 0) {
      // Check encirclement
      const neighbors = hexNeighbors(u.q, u.r);
      const friendlyNeighbor = neighbors.some(n=>{
        const nu = getUnitAt(n.q, n.r);
        const nh = getHex(n.q, n.r);
        return (nu && nu.owner === u.owner) || (nh && nh.owner === u.owner);
      });
      const mult = friendlyNeighbor ? 1 : 2;
      u.equip -= 1 * mult;
      u.org -= 15 * mult;
      logEvent(`⚠ ${u.name} 断补给${!friendlyNeighbor?'(被包围)':''} -${1*mult}HP`);
      if (u.equip <= 0) {
        logEvent(`💀 ${u.name} 因断补给覆灭`);
        removeUnit(u.id);
      }
    }
  }
}

function consolidateTerritory() {
  // Simple territory consolidation: hexes with friendly units become owned
  for (let id in units) {
    const u = units[id];
    const h = getHex(u.q, u.r);
    if (h && h.owner !== u.owner && !h.terrain.imp) {
      // Check if no enemy unit adjacent
      const enemyNear = hexNeighbors(u.q, u.r).some(n=>{
        const nu = getUnitAt(n.q, n.r);
        return nu && nu.owner !== u.owner;
      });
      if (!enemyNear) {
        h.owner = u.owner;
      }
    }
  }
}

function checkVictory() {
  const ukCPs = capturePoints.filter(cp=>{
    const h = getHex(cp.q, cp.r);
    return h && h.owner === PLAYER.UK;
  });
  const deCPs = capturePoints.filter(cp=>{
    const h = getHex(cp.q, cp.r);
    return h && h.owner === PLAYER.GERMANY;
  });
  const total = capturePoints.length;

  if (ukCPs.length >= Math.ceil(total * 0.6) && currentTurn > 5) {
    showEndModal('🇬🇧 英军战略胜利!',
      `盟军控制了 ${ukCPs.length}/${total} 个战略点\n\n` +
      `西西里岛门户洞开,意大利战役即将开始!\n` +
      `历史参考: 1943年8月17日,盟军完全占领西西里\n` +
      `耗时38天,轴心国损失约2.9万人`);
    return true;
  }
  if (deCPs.length >= Math.ceil(total * 0.6) && currentTurn > 5) {
    showEndModal('🇩🇪 德军防御胜利!',
      `德军控制了 ${deCPs.length}/${total} 个战略点\n\n` +
      `轴心国成功守住了西西里岛!\n` +
      `盟军被迫推迟意大利本土登陆计划`);
    return true;
  }
  // Sudden death: if UK controls 0 points
  if (ukCPs.length === 0 && currentTurn > 3) {
    showEndModal('🇩🇪 德军压倒性胜利!',
      `英军所有登陆点均被夺回!\n盟军被迫撤离西西里岛`);
    return true;
  }
  // Sudden death: if DE controls 0 points
  if (deCPs.length === 0 && currentTurn > 3) {
    showEndModal('🇬🇧 英军压倒性胜利!',
      `德军已无立足之地!\n西西里全岛解放`);
    return true;
  }
  return false;
}

function endGameByPoints() {
  const ukCPs = getControlledCPs(PLAYER.UK);
  const deCPs = getControlledCPs(PLAYER.GERMANY);
  if (ukCPs > deCPs) showEndModal('🇬🇧 英军胜利!', `回合结束\n英军: ${ukCPs} 点 vs 德军: ${deCPs} 点`);
  else if (deCPs > ukCPs) showEndModal('🇩🇪 德军胜利!', `回合结束\n德军: ${deCPs} 点 vs 英军: ${ukCPs} 点`);
  else showEndModal('🤝 平局', `双方各控制 ${ukCPs} 个战略点`);
}

}

function doDeployType(typeId, q, r, nation) {
  const pp = getPhasePlayer();
  const rp = reinfPoints[pp] || 0;
  let cost = getReinfCost(typeId);
  // Italian infantry: cheaper but weaker
  if (nation === 'ita') cost = 1;
  if (rp < cost) { logEvent('兵力点不足!'); return; }

  // Validate: must be owned hex with no unit
  const h = getHex(q, r);
  if (!h || h.unitId || h.owner !== pp) { logEvent('无效的部署位置'); return; }

  const ut = UNIT_TYPES[typeId];
  const prefix = pp===PLAYER.UK?'英军':'德军';
  const natLabel = nation==='ita'?'🇮🇹意大利':'';
  createUnit(typeId, pp, q, r, `${prefix}${natLabel} 增援${ut.name}`, {nation: nation || null});
  reinfPoints[pp] -= cost;
  closeModal();
  updateAll();
  logEvent(`🪖 ${prefix}${natLabel} 部署 ${ut.name} 到 (${q},${r}) [-${cost}兵力点]`);
}

function saveGame() {
  const state = {
    version: SAVE_VERSION,
    gameMode: gameMode,
    turn: currentTurn, phase: currentPhase, player: currentPlayer,
    reinfPoints: reinfPoints,
    unitOrders: unitOrders,
    capturePoints: capturePoints.map(cp=>({q:cp.q, r:cp.r, owner: getHex(cp.q,cp.r)?.owner || cp.startOwner})),
    units: {},
    hexOwners: [],
    playerCards: playerCards,
    unitCardBuffs: unitCardBuffs,
    exploredHexes: {1: [...exploredHexes[1]], 2: [...exploredHexes[2]]},
    riverEdges: [...RIVER_EDGES],
  };
  for (let id in units) {
    const u = units[id];
    state.units[id] = {
      typeId:u.typeId, owner:u.owner, q:u.q, r:u.r,
      name:u.name, equip:u.equip, org:u.org, maxOrg:u.maxOrg, order:u.order,
      hasMoved:u.hasMoved, hasFought:u.hasFought, routed:u.routed,
      nation: u.nation || null
    };
  }
  for (let r=0; r<ROWS; r++)
    for (let q=0; q<COLS; q++) {
      const h = hexGrid[r][q];
      if (h.owner !== PLAYER.NONE) state.hexOwners.push({q,r,owner:h.owner});
    }
  try {
    localStorage.setItem('husky_save_v3', JSON.stringify(state));
    logEvent('💾 游戏已保存');
  } catch(e) { logEvent('❌ 保存失败: '+e.message); }
}

function loadGame() {
  try {
    const raw = localStorage.getItem('husky_save_v3');
    if (!raw) { logEvent('❌ 无存档'); return; }
    const state = JSON.parse(raw);
    initMap();
    units = {}; unitIdCounter = 1; unitOrders = {};
    for (let id in state.units) {
      const su = state.units[id];
      const unit = createUnit(su.typeId, su.owner, su.q, su.r, su.name, {nation: su.nation || null});
      unit.equip = su.equip; unit.org = su.org;
      if (su.maxOrg) { unit.maxOrg = su.maxOrg; unit.org = Math.min(unit.org, su.maxOrg); }
      unit.order = su.order || null;
      unit.hasMoved = su.hasMoved || false;
      unit.hasFought = su.hasFought || false;
      unit.routed = su.routed || false;
      unit.nation = su.nation || null;
      unitIdCounter = Math.max(unitIdCounter, parseInt(id.slice(1))+1);
      if (unit.order) unitOrders[id] = unit.order;
    }
    for (let ho of state.hexOwners) {
      const h = getHex(ho.q, ho.r);
      if (h) h.owner = ho.owner;
    }
    if (state.capturePoints) {
      for (let i=0; i<Math.min(capturePoints.length, state.capturePoints.length); i++) {
        capturePoints[i].startOwner = state.capturePoints[i].owner;
        const h = getHex(capturePoints[i].q, capturePoints[i].r);
        if (h) h.owner = state.capturePoints[i].owner;
      }
    }
    gameMode = state.gameMode || GAME_MODE.HOTSEAT;
    currentTurn = state.turn;
    currentPhase = state.phase;
    currentPlayer = state.player;
    reinfPoints = state.reinfPoints || {1:0,2:0};
    unitOrders = state.unitOrders || {};
    playerCards = state.playerCards || {1:[], 2:[]};
    unitCardBuffs = state.unitCardBuffs || {};
    exploredHexes = state.exploredHexes ? {1: new Set(state.exploredHexes[1]||[]), 2: new Set(state.exploredHexes[2]||[])} : {1: new Set(), 2: new Set()};
    RIVER_EDGES.clear();
    if (state.riverEdges) { for (let key of state.riverEdges) RIVER_EDGES.add(key); }
    visibleHexes = {1: new Set(), 2: new Set()};
    playerActiveCards = {1:[], 2:[]}; // never persist active effects
    selectedUnitId = null;
    pendingOrder = null;
    selectedActionType = ACTION_TYPE.MOVE;
    selectedCardUid = null;
    aiThinking = false;
    calculateSupply();
    updateAll();
    logEvent('📂 读档成功 — 第'+currentTurn+'回合');
    // Resume AI if loaded during AI phase
    if (isAIPhase()) setTimeout(triggerAI, 800);
  } catch(e) { logEvent('❌ 读档失败: '+e.message); }
}

document.addEventListener('keydown', function(e) {
  // Block shortcuts when modal or transition screen is visible
  const modal = document.getElementById('modal');
  const transition = document.getElementById('transition-screen');
  if ((modal && modal.style.display !== 'none') || (transition && transition.style.display !== 'none')) {
    if (e.key === 'Enter' || e.key === ' ') return; // let modal/transition handle these
    if (e.key === 'Escape') { closeModal(); return; }
    return;
  }
  if (e.key === 'Escape') {
    cancelOrder();
  } else if (e.key === 'Enter' && pendingOrder) {
    confirmOrder();
  } else if (e.key === 'F4') {
    if (confirm('确定要重新开始吗?')) location.reload();
  }
});

  // Pre-explore all land hexes so terrain is always visible
  for (let r=0; r<ROWS; r++) for (let q=0; q<COLS; q++) {

    if (h && !h.terrain.imp) {
      exploredHexes[PLAYER.UK].add(hexKey(q,r));
      exploredHexes[PLAYER.GERMANY].add(hexKey(q,r));

  zoom = 1.0;
  const cp = hexToPixel(25, 18);

        var cneed = c.target !== 'global' ? ' <span style="color:#f39c12;font-size:8px">🎯' + (c.target==='unit'?'单位':'格') + '</span>' : '';
        html += '<div style="background:#1a2a1a;border:1px solid ' + csel + ';border-radius:3px;padding:2px 5px;margin:1px 0;cursor:pointer;font-size:9px" onclick="selectCard(' + c.uid + ')" ondblclick="quickPlayCard(' + c.uid + ')" title="' + c.desc + '">';
        html += c.icon + ' <b>' + c.name + '</b>' + cneed;
        html += '<span style="float:right;color:#666;cursor:pointer" onclick="event.stopPropagation();discardCard(' + pp + ',' + c.uid + ')" title="弃牌">✕</span>';
        html += '</div>';
      }
    }
    // Selected card targeting hint
    if (selectedCardUid) {
      var sc = hand.find(function(c2){return c2.uid===selectedCardUid;});
      if (sc && sc.target !== 'global') {
        html += '<div style="font-size:8px;color:#f1c40f;margin-top:2px">🎯 点' + (sc.target==='unit'?'己方单位':'地图格') + '使用 ' + sc.icon + sc.name + '</div>';
      }
    }
    html += '</div>';

    apBody.innerHTML = html;
    // Set initial position if not yet placed (avoid sticking to bottom)
    if (!actionPanel._placed) {
      actionPanel._placed = true;
      actionPanel.style.top = Math.max(60, window.innerHeight * 0.15) + 'px';
      actionPanel.style.left = Math.max(10, window.innerWidth - 370) + 'px';
    }
    actionPanel.style.display = 'block';
  }

  function apBtn(label, type, enabled) {
    var sel = selectedActionType === type ? ' active' : '';
    var dis = enabled ? '' : ' disabled';
    return '<button class="ap-btn' + sel + '" onclick="setActionType(\'' + type + '\')"' + (enabled ? '' : ' disabled') + '>' + label + '</button>';
  }

  // Hook into updateSidebar to also update the floating panel
  var _origUpdateSidebar = updateSidebar;
  updateSidebar = function() {
    _origUpdateSidebar();
    updateActionPanel();
  };

  function gameLoop() {
    updateFOW();
    render();
    requestAnimationFrame(gameLoop);
  }
  gameLoop();

  // Start draft, then begin game when done
  startInitialDraft(function(){
    startTurn();
    updateAll();
    logEvent('⚔ 哈士奇行动 · WEGO版');
    logEvent('部署阶段: 在己方占领点点击部署增援');
    if (gameMode === GAME_MODE.AI_VS_DE) {
      setTimeout(triggerAI, 1000);
    }
  });
}
window.startGame = startGame;

window.addEventListener('load', initGame);
if (document.readyState === 'complete') { console.log('DOM ready, booting...'); initGame(); }
</script>
</body>
</html>
