<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;font-family:"Microsoft YaHei",sans-serif;overflow:hidden;height:100vh;color:#ddd}
#app{display:grid;grid-template-columns:240px 1fr;grid-template-rows:44px 1fr 56px;height:100vh}
#toolbar{grid-column:1/-1;grid-row:1;background:#16213e;display:flex;align-items:center;gap:12px;padding:0 12px;border-bottom:2px solid #c0392b;z-index:10}
#toolbar h1{font-size:15px;color:#e74c3c;white-space:nowrap}
#toolbar .info{font-size:11px;color:#aaa}
#toolbar .player-badge{padding:3px 12px;border-radius:3px;font-size:13px;font-weight:bold}
#toolbar .phase-indicator{padding:3px 8px;border-radius:3px;font-size:11px;font-weight:bold;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
.badge-uk{background:#1a5276;color:#85c1e9}
.badge-de{background:#641e16;color:#f1948a}
#sidebar{grid-column:1;grid-row:2;background:#1b1b2f;overflow-y:auto;padding:10px;border-right:1px solid #333;display:flex;flex-direction:column;gap:8px}
#sidebar h3{font-size:13px;color:#e74c3c;border-bottom:1px solid #333;padding-bottom:4px;margin-bottom:2px}
#sidebar .unit-card{background:#222;border-radius:6px;padding:7px 9px;cursor:pointer;border:2px solid transparent;font-size:11px;transition:all 0.15s}
#sidebar .unit-card:hover{border-color:#555}
#sidebar .unit-card.selected{border-color:#e74c3c;background:#2a1a1a}
#sidebar .unit-card .name{font-weight:bold;color:#eee;font-size:12px}
#sidebar .unit-card .stats{color:#aaa;font-size:10px;margin-top:2px}
#sidebar .bar-wrap{background:#333;height:5px;border-radius:3px;margin-top:2px;overflow:hidden}
#sidebar .bar-fill{height:100%;border-radius:3px;transition:width 0.3s}
.bar-equip{background:#27ae60}.bar-org{background:#2980b9}
#sidebar .supply-info{font-size:10px;color:#888;padding:4px 6px;background:#1a1a2a;border-radius:3px}
#canvas-wrap{grid-column:2;grid-row:2;position:relative;overflow:hidden;cursor:grab;background:#0a0a1a}
#canvas-wrap.dragging{cursor:grabbing}
#canvas-wrap canvas{display:block}
#bottombar{grid-column:1/-1;grid-row:3;background:#16213e;display:flex;align-items:center;gap:10px;padding:0 12px;border-top:2px solid #c0392b}
#bottombar button{padding:6px 16px;border:none;border-radius:4px;cursor:pointer;font-size:13px;font-weight:bold;transition:filter 0.15s}
#bottombar button:hover{filter:brightness(1.2)}
#bottombar button:disabled{opacity:0.4;cursor:not-allowed;filter:none}
.btn-primary{background:#c0392b;color:#fff}
.btn-secondary{background:#2c3e50;color:#ccc}
.btn-green{background:#27ae60;color:#fff}
.btn-gold{background:#d4a017;color:#000}
#log{flex:1;font-size:11px;color:#888;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
#tooltip{position:fixed;background:rgba(0,0,0,0.9);color:#fff;padding:6px 10px;border-radius:4px;font-size:11px;pointer-events:none;z-index:100;display:none;max-width:280px;line-height:1.4}
#modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.75);z-index:200;display:flex;align-items:center;justify-content:center}
#modal .box{background:#1b1b2f;padding:24px 32px;border-radius:12px;text-align:center;border:2px solid #c0392b;min-width:300px}
#modal h2{color:#e74c3c;margin-bottom:8px}
#modal button{margin:8px 6px;padding:8px 20px;border:none;border-radius:4px;cursor:pointer;font-size:14px;font-weight:bold}
#modal .reinforce-btn{padding:6px 14px;font-size:12px;margin:3px}
#transition-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:#000;z-index:300;display:none;align-items:center;justify-content:center;flex-direction:column}
#transition-screen .msg{font-size:28px;color:#fff;margin-bottom:12px}
#transition-screen .sub{font-size:14px;color:#aaa}

#stats-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.92);z-index:350;display:none;align-items:center;justify-content:center;flex-direction:column;overflow-y:auto;padding:20px}
#stats-screen .stats-card{background:#151525;border:2px solid #555;border-radius:14px;padding:24px 28px;max-width:700px;width:90%;color:#ddd;font-size:13px;line-height:1.7}

#stats-screen .stats-col.uk h3{color:#85c1e9;border-color:#2980b9}

#stats-screen .stat-block .item{font-size:12px;padding:2px 0;border-bottom:1px dotted #2a2a3a}
#stats-screen .stat-block .item:last-child{border-bottom:none}
#stats-screen .stat-empty{color:#555;font-style:italic;font-size:12px}
#stats-screen .btn-continue{display:block;margin:18px auto 0;padding:8px 36px;background:#2c3e50;color:#fff;border:1px solid #5a7a9a;border-radius:6px;cursor:pointer;font-size:15px}

#action-panel{position:fixed;background:#1a1a2e;border:2px solid #555;border-radius:10px;z-index:200;display:none;width:fit-content;max-width:340px;box-shadow:0 4px 24px rgba(0,0,0,0.6);user-select:none}
#action-panel .ap-header{cursor:move;padding:6px 12px;background:#222240;border-radius:8px 8px 0 0;font-size:12px;color:#ddd;display:flex;justify-content:space-between;align-items:center}

const GAME_MODE = { HOTSEAT:0, UK_VS_AI:1, AI_VS_DE:2 };
let gameMode = GAME_MODE.HOTSEAT;
let aiThinking = false;

function isAIPhase() {
  if (gameMode === GAME_MODE.UK_VS_AI && currentPlayer === PLAYER.GERMANY) return true;
  if (gameMode === GAME_MODE.AI_VS_DE && currentPlayer === PLAYER.UK) return true;
  return false;
}

// ---- AI Deploy ----
function runAIDeploy() {
  var player = currentPlayer;
  var rp = reinfPoints[player] || 0;
  if (rp <= 0) { endAIPhase(); return; }

  var myCPs = capturePoints.filter(function(cp){
    var h = getHex(cp.q, cp.r);
    return h && h.owner === player && !h.unitId;
  });
  var enemyPlayer = player===PLAYER.UK ? PLAYER.GERMANY : PLAYER.UK;
  myCPs.sort(function(a,b){
    return minDistToEnemyCP(a.q, a.r, enemyPlayer) - minDistToEnemyCP(b.q, b.r, enemyPlayer);
  });

  if (rp >= 4 && Math.random() < 0.4) { buyTacticalCard(player); }

  var rp2 = reinfPoints[player] || 0;
  // Germany: 35% chance to deploy cheap Italian infantry instead
  if (player === PLAYER.GERMANY && rp2 >= 1 && Math.random() < 0.35) {
    for (var i=0; i<myCPs.length; i++) {
      var cp = myCPs[i];
      createUnit('inf', player, cp.q, cp.r, '德军🇮🇹 AI-意大利步兵', {nation:'ita'});
      reinfPoints[player] = Math.max(0, (reinfPoints[player]||0) - 1);
      logEvent('🤖 AI部署 🇮🇹意大利步兵 到 ('+cp.q+','+cp.r+') [-1点]');
      updateAll();
      return;
    }
  }
  var prefOrder = player===PLAYER.UK ? ['arm','inf','art','eng','rec'] : ['inf','art','eng','inf','rec'];
  for (var i=0; i<myCPs.length; i++) {
    var cp = myCPs[i];
    for (var j=0; j<prefOrder.length; j++) {
      var cost = getReinfCost(prefOrder[j]);
      if ((reinfPoints[player]||0) >= cost) {
        var prefix = player===PLAYER.UK ? '英军' : '德军';
        createUnit(prefOrder[j], player, cp.q, cp.r, prefix+' AI-'+UNIT_TYPES[prefOrder[j]].name);
        reinfPoints[player] = Math.max(0, (reinfPoints[player]||0) - cost);
        logEvent('🤖 AI部署 '+UNIT_TYPES[prefOrder[j]].name+' 到 ('+cp.q+','+cp.r+')');
        updateAll();
        return;
      }
    }
  }
  endAIPhase();
}

function minDistToEnemyCP(q, r, enemyPlayer) {
  var md = 99;
  for (var i=0; i<capturePoints.length; i++) {
    var cp = capturePoints[i];
    var h = getHex(cp.q, cp.r);
    if (h && h.owner === enemyPlayer) {
      var d = hexDistance(q, r, cp.q, cp.r);
      if (d < md) md = d;
    }
  }
  return md;
}

// ---- AI Orders ----
function runAIOrders() {
  var player = currentPlayer;
  var enemyPlayer = player===PLAYER.UK ? PLAYER.GERMANY : PLAYER.UK;
  var myUnits = [];
  for (var id in units) {
    var u = units[id];
    if (u.owner === player && u.equip > 0 && !unitOrders[id]) myUnits.push(u);
  }
  if (myUnits.length === 0) { endAIPhase(); return; }

  for (var i=0; i<myUnits.length; i++) {
    var unit = myUnits[i];
    if (unitOrders[unit.id]) continue;
    var ut = getUnitType(unit);

    // Find nearest enemy
    var nearestEnemy = null, nearestDist = 99;
    for (var id2 in units) {
      var u2 = units[id2];
      if (u2.owner !== enemyPlayer || u2.equip <= 0) continue;
      var d = hexDistance(unit.q, unit.r, u2.q, u2.r);
      if (d < nearestDist) { nearestDist = d; nearestEnemy = u2; }
    }

    // Find nearest enemy CP
    var nearestECP = null, nearestECPDist = 99;
    for (var j=0; j<capturePoints.length; j++) {
      var cp = capturePoints[j];
      var h = getHex(cp.q, cp.r);
      if (h && h.owner === enemyPlayer) {
        var d2 = hexDistance(unit.q, unit.r, cp.q, cp.r);
        if (d2 < nearestECPDist) { nearestECPDist = d2; nearestECP = cp; }
      }
    }

    // Decide action
    var action = null;
    if (unit.routed) {
      action = (nearestEnemy && nearestDist <= 3) ? 'retreat' : 'move';
    } else if (unit.org < unit.maxOrg * 0.25) {
      action = 'retreat';
    } else if (nearestEnemy && nearestDist <= ut.rng) {
      action = 'attack';
    } else if (nearestECP) {
      action = 'move';
    }
    if (!action) continue;

    if (action === 'attack' && nearestEnemy) {
      selectedUnitId = unit.id;
      giveAttackOrder(unit, nearestEnemy.q, nearestEnemy.r, nearestEnemy, ACTION_TYPE.ATTACK);
    } else if (action === 'retreat' && nearestEnemy) {
      var retreatHex = null, bestD = nearestDist;
      var dirs = hexNeighbors(unit.q, unit.r);
      for (var k=0; k<dirs.length; k++) {
        var nh = getHex(dirs[k].q, dirs[k].r);
        if (!nh || nh.terrain.imp || getUnitAt(dirs[k].q, dirs[k].r)) continue;
        var dd = hexDistance(dirs[k].q, dirs[k].r, nearestEnemy.q, nearestEnemy.r);
        if (dd > bestD) { bestD = dd; retreatHex = dirs[k]; }
      }
      if (retreatHex) {
        var rpath = findPath(unit.q, unit.r, retreatHex.q, retreatHex.r, unit);
        selectedUnitId = unit.id;
        if (rpath && rpath.length > 0) giveMoveOrder(unit, retreatHex.q, retreatHex.r, rpath, ACTION_TYPE.RAPID_WITHDRAW);
      }
    } else if (nearestECP) {
      var tq = nearestECP.q, tr = nearestECP.r;
      var nb = hexNeighbors(tq, tr).filter(function(n){
        var nh = getHex(n.q, n.r);
        return nh && !nh.terrain.imp && !getUnitAt(n.q, n.r);
      });
      var bestPath = null, bestLen = 99;
      for (var m=0; m<nb.length; m++) {
        var p = findPath(unit.q, unit.r, nb[m].q, nb[m].r, unit);
        if (p && p.length < bestLen) { bestPath = p; bestLen = p.length; }
      }
      if (bestPath && bestLen > 0) {
        var dest = bestPath[bestPath.length-1];
        var mt = nearestDist <= 5 ? ACTION_TYPE.FORCED_MARCH : ACTION_TYPE.MOVE;
        selectedUnitId = unit.id;
        giveMoveOrder(unit, dest.q, dest.r, bestPath, mt);
      }
    }
    if (pendingOrder) { confirmOrder(); }
  }
  runAICards();
  endAIPhase();
}

// ---- AI Card Usage ----
function runAICards() {
  var player = currentPlayer;
  var hand = playerCards[player] || [];
  if (hand.length === 0) return;
  var nearEnemyCount = 0;
  for (var id in units) {
    var u = units[id];
    if (u.owner !== player || u.equip <= 0) continue;
    for (var id2 in units) {
      var u2 = units[id2];
      if (u2.owner === player || u2.equip <= 0) continue;
      if (hexDistance(u.q, u.r, u2.q, u2.r) <= 3) nearEnemyCount++;
    }
  }
  // Find best target unit for unit cards
  var strongestUnit = null, bestAtk = -1;
  var mostDamagedUnit = null, lowestOrgPct = 1.0;
  for (var uid in units) {
    var uu = units[uid];
    if (uu.owner !== player || uu.equip <= 0) continue;
    var ut = getUnitType(uu);
    var atk = ut && (uu.owner===PLAYER.UK ? ut.softAtk : ut.hardAtk) || 0;
    if (atk > bestAtk) { bestAtk = atk; strongestUnit = uu; }
    var orgPct = uu.org / uu.maxOrg;
    if (orgPct < lowestOrgPct) { lowestOrgPct = orgPct; mostDamagedUnit = uu; }
  }
  var cardsToPlay = [];
  for (var i=0; i<hand.length; i++) {
    var card = hand[i];
    var play = false, targetId = null, targetQ, targetR;
    if (card.effType === 'attackDice' && nearEnemyCount >= 3) play = true;
    if (card.effType === 'equipRepair' && nearEnemyCount >= 2) play = true;
    if (card.effType === 'removeRout') {
      for (var id in units) { var ur = units[id]; if (ur.owner === player && ur.routed) { play = true; break; } }
    }
    if (card.effType === 'supplyRadius' && nearEnemyCount >= 2) play = true;
    if (card.effType === 'defenseDice' && nearEnemyCount >= 2) play = true;
    // Unit-targeting cards
    if (card.effType === 'unitAtkBonus' && strongestUnit && nearEnemyCount >= 2) {
      play = true; targetId = strongestUnit.id;
    }
    if (card.effType === 'orgRepair' && mostDamagedUnit && lowestOrgPct < 0.5) {
      play = true; targetId = mostDamagedUnit.id;
    }
    if (play) {
      if (card.target === 'global') cardsToPlay.push({uid:card.uid});
      else if (card.target === 'unit' && targetId) cardsToPlay.push({uid:card.uid, targetId:targetId});
    }
  }
  for (var j=0; j<cardsToPlay.length; j++) {
    var cp = cardsToPlay[j];
    playCard(player, cp.uid, cp.targetId || null);
  }
}

// ---- AI Phase Handler ----
function endAIPhase() {
  aiThinking = false;
  // Hide AI overlay before showing the normal transition screen
  document.getElementById('transition-screen').style.display = 'none';
  if (currentPhase === PHASE.DEPLOY_UK) endDeployUK();
  else if (currentPhase === PHASE.DEPLOY_DE) endDeployDE();
  else if (currentPhase === PHASE.ORDERS_UK) endOrdersUK();
  else if (currentPhase === PHASE.ORDERS_DE) endOrdersDE();
}

function triggerAI() {
  if (!isAIPhase() || aiThinking) return;
  aiThinking = true;
  // Show AI overlay — blocks view of AI operations, no click required
  var screen = document.getElementById('transition-screen');
  document.getElementById('transition-msg').textContent = '🤖 AI思考中...';
  document.getElementById('transition-sub').textContent = '请稍候，AI正在进行决策';
  screen.style.display = 'flex';
  logEvent('🤖 AI思考中...');
  if (currentPhase === PHASE.DEPLOY_UK || currentPhase === PHASE.DEPLOY_DE) {
    function deployStep() {
      if (!isAIPhase() || currentPhase === PHASE.RESOLVE) { aiThinking = false; document.getElementById('transition-screen').style.display = 'none'; return; }
      var rp = reinfPoints[currentPlayer] || 0;
      if (rp <= 0) { endAIPhase(); return; }
      runAIDeploy();
      if ((reinfPoints[currentPlayer]||0) > 0 && isAIPhase()) { setTimeout(deployStep, 500); }
      else { setTimeout(function(){ if (isAIPhase()) endAIPhase(); }, 400); }
    }
    setTimeout(deployStep, 600);
  } else if (currentPhase === PHASE.ORDERS_UK || currentPhase === PHASE.ORDERS_DE) {
    setTimeout(function(){
      if (!isAIPhase()) { aiThinking = false; document.getElementById('transition-screen').style.display = 'none'; return; }
      runAIOrders();
    }, 600);
  }
}

function hexToPixel(q, r) {
  return {x: HEX_SIZE * (SQRT3 * q + SQRT3/2 * r), y: HEX_SIZE * (3/2 * r)};
}
function pixelToHex(px, py) {
  const q = (SQRT3/3 * px - 1/3 * py) / HEX_SIZE;
  const r = (2/3 * py) / HEX_SIZE;
  return hexRound(q, r);
}
function hexRound(q, r) {
  const s = -q - r;
  let rq = Math.round(q), rr = Math.round(r), rs = Math.round(s);
  const dq = Math.abs(rq - q), dr = Math.abs(rr - r), ds = Math.abs(rs - s);
  if (dq > dr && dq > ds) rq = -rr - rs;
  else if (dr > ds) rr = -rq - rs;
  return {q:rq, r:rr};
}
function hexCorners(cx, cy) {
  const pts = [];
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI/180 * (60*i - 30);
    pts.push({x:cx + HEX_SIZE*Math.cos(angle), y:cy + HEX_SIZE*Math.sin(angle)});
  }
  return pts;
}
function hexNeighbors(q, r) {
  const dirs = [[1,0],[1,-1],[0,-1],[-1,0],[-1,1],[0,1]];
  return dirs.map(d=>({q:q+d[0], r:r+d[1]})).filter(h=>isValidHex(h.q,h.r));
}
function hexDistance(q1, r1, q2, r2) {
  return (Math.abs(q1-q2) + Math.abs(q1+r1-q2-r2) + Math.abs(r1-r2)) / 2;
}
function isValidHex(q, r) {
  return q >= 0 && q < COLS && r >= 0 && r < ROWS;
}
function getHex(q, r) {
  if (!isValidHex(q,r)) return null;
  return hexGrid[r][q];
}
function hexKey(q,r) { return q+','+r; }

// Hex edge definitions — maps each of the 6 neighbor directions to the two corner
// indices that form the shared edge between the current hex and that neighbor.
// Used for river edges, deployment borders, and reachable-range outlines.
const EDGE_DEFS = [
  {dq:1, dr:0,  c1:0, c2:1},  // East       (neighbor +1, 0)  — corners 0→1
  {dq:0, dr:1,  c1:1, c2:2},  // Southeast  (neighbor  0,+1)  — corners 1→2
  {dq:-1,dr:1,  c1:2, c2:3},  // Southwest  (neighbor -1,+1)  — corners 2→3
  {dq:-1,dr:0,  c1:3, c2:4},  // West       (neighbor -1, 0)  — corners 3→4
  {dq:0, dr:-1, c1:4, c2:5},  // Northwest  (neighbor  0,-1)  — corners 4→5
  {dq:1, dr:-1, c1:5, c2:0},  // Northeast  (neighbor +1,-1)  — corners 5→0
];

// RIVER_EDGES: Set of hex-edge identifiers representing rivers.
// An edge is the border between two adjacent hexes, identified by a canonical
// string "q1,r1|q2,r2" where (q1,r1) is lexicographically ≤ (q2,r2).
const RIVER_EDGES = new Set();

// Generate a canonical, direction-independent key for the edge between two hexes.
function edgeKey(q1, r1, q2, r2) {
  const a = q1 + ',' + r1, b = q2 + ',' + r2;
  return a < b ? a + '|' + b : b + '|' + a;
}

// Check whether a river edge exists between two (adjacent) hexes.
function hasRiverEdge(q1, r1, q2, r2) {
  return RIVER_EDGES.has(edgeKey(q1, r1, q2, r2));
}

// 2d6 bell-curve dice roll (range 2-12, mean 7)
function roll2d6() {
  return Math.floor(Math.random() * 6) + Math.floor(Math.random() * 6) + 2;
}

// Fog of War
let exploredHexes = {1: new Set(), 2: new Set()}; // hex keys player has ever seen
let visibleHexes = {1: new Set(), 2: new Set()};   // hex keys currently visible

function calculateVisibility() {
  // Reset current visibility
  visibleHexes[PLAYER.UK] = new Set();
  visibleHexes[PLAYER.GERMANY] = new Set();
  // Always-visible: all non-impassable hexes within 2 of owned capture point or unit — no, just unit-based
  // BFS from each unit
  for (let player of [PLAYER.UK, PLAYER.GERMANY]) {
    const vis = visibleHexes[player];
    const explored = exploredHexes[player];
    // Always see own CPs and adjacent hexes
    for (let cp of capturePoints) {
      const cph = getHex(cp.q, cp.r);
      if (cph && cph.owner === player) {
        vis.add(hexKey(cp.q, cp.r));
        explored.add(hexKey(cp.q, cp.r));
        for (let n of hexNeighbors(cp.q, cp.r)) {
          const nh = getHex(n.q, n.r);
          if (nh && !nh.terrain.imp) {
            vis.add(hexKey(n.q, n.r));
            explored.add(hexKey(n.q, n.r));
          }
        }
      }
    }
    // Unit-based vision
    for (let id in units) {
      const u = units[id];
      if (u.owner !== player || u.equip <= 0) continue;
      // If recon card active, all enemy hexes are visible — handled per-player
      const ut = getUnitType(u);
      let visRange = ut.vision || 3;
      // Enna: +3 vision for unit on the Enna CP
      const ennaCP = capturePoints.find(cp=>cp.effect==='enna');
      if (ennaCP && u.q===ennaCP.q && u.r===ennaCP.r) {
        visRange += 3;
      }
      // BFS from unit position
      const startKey = hexKey(u.q, u.r);
      const visited = new Set([startKey]);
      const queue = [{q:u.q, r:u.r, d:0}];
      while (queue.length > 0) {
        const {q, r, d} = queue.shift();
        vis.add(hexKey(q,r));
        explored.add(hexKey(q,r));
        if (d >= visRange) continue;
        for (let n of hexNeighbors(q, r)) {
          const nk = hexKey(n.q, n.r);
          if (visited.has(nk)) continue;
          visited.add(nk);
          // Mountains/hills reduce vision range by blocking (cost 2 instead of 1)
          const nh = getHex(n.q, n.r);
          if (!nh || nh.terrain.imp) continue;
          const stepCost = (nh.terrain.id === 4) ? 2 : 1; // mountain blocks vision faster
          if (d + stepCost <= visRange) {
            queue.push({q:n.q, r:n.r, d: d + stepCost});
          }
        }
      }
    }
    // RevealAll card: make all non-impassable hexes visible
    if (hasActiveEffect(player, 'revealAll')) {
      for (let r=0; r<ROWS; r++) {
        for (let q=0; q<COLS; q++) {
          const h = hexGrid[r][q];
          if (h && !h.terrain.imp) {
            vis.add(hexKey(q,r));
            explored.add(hexKey(q,r));
          }
        }
      }
    }
  }
}

// Check if a hex is visible to a player
function isHexVisible(q, r, player) {
  // Sea hexes near land are partially visible — let's say sea hexes within 3 of any owned hex
  const h = getHex(q, r);
  if (!h) return false;
  if (h.terrain.imp) {
    // Sea hex: visible if adjacent to any visible/explored land hex
    for (let n of hexNeighbors(q, r)) {
      const nh = getHex(n.q, n.r);
      if (nh && !nh.terrain.imp && visibleHexes[player].has(hexKey(n.q, n.r))) return true;
    }
    return false;
  }
  return visibleHexes[player].has(hexKey(q,r));
}
function isHexExplored(q, r, player) {
  return exploredHexes[player].has(hexKey(q,r));
}

// Update FOW after any state change
function updateFOW() {
  calculateVisibility();
  // Always update explored from visible (visible → explored)
  for (let player of [PLAYER.UK, PLAYER.GERMANY]) {
    for (let key of visibleHexes[player]) {
      exploredHexes[player].add(key);
    }
  }
}

function drawTacticalCard(player) {

  playerCards[player].push(card);
  logEvent(`🃏 ${player===PLAYER.UK?'英军':'德军'} 获得: ${card.icon} ${card.name}`);

}

function playCard(player, cardUid, targetUnitId, targetQ, targetR) {
  const hand = playerCards[player];
  const idx = hand.findIndex(c=>c.uid===cardUid);
  if (idx < 0) return false;
  const card = hand[idx];

  // Validate target requirements
  if (card.target === 'unit' && !targetUnitId) { logEvent('⚠ 需要指定一个己方单位'); return false; }
  if (card.target === 'hex' && (targetQ===undefined || targetR===undefined)) { logEvent('⚠ 需要指定目标六角格'); return false; }

  // For unit-targeting cards, verify the unit belongs to the player
  if (card.target === 'unit') {
    const tu = getUnit(targetUnitId);
    if (!tu || tu.owner !== player) { logEvent('⚠ 只能对己方单位使用'); return false; }
  }

  // Create active effect record
  const activeEff = {
    cardId: card.id, cardName: card.name, cardIcon: card.icon,
    effType: card.effType, effVal: card.effVal,
    targetUnitId: targetUnitId || null, targetQ: targetQ, targetR: targetR,
    player: player
  };
  playerActiveCards[player].push(activeEff);

  // Apply immediate effects
  if (card.effType === 'fullRepair' && targetUnitId) {
    const tu = getUnit(targetUnitId);
    if (tu) { tu.equip = tu.maxEquip; tu.org = tu.maxOrg; }
  }
  if (card.effType === 'removeRout') {
    for (let id in units) {
      const u = units[id];
      if (u.owner === player && u.routed) { u.routed = false; logEvent(`  ✅ ${u.name} 恢复士气`); }
    }
  }
  if (card.effType === 'equipRepair') {
    for (let id in units) {
      const u = units[id];
      if (u.owner === player && u.equip > 0) u.equip = Math.min(u.maxEquip, u.equip + card.effVal);
    }
    logEvent(`  🔧 所有${player===PLAYER.UK?'英军':'德军'}单位 +${card.effVal}装备`);
  }
  if (card.effType === 'navalStrike' && targetQ !== undefined) {
    const tu = getUnitAt(targetQ, targetR);
    const dmg = Math.floor(Math.random() * card.effVal) + 1;
    if (tu && tu.equip > 0) {
      tu.equip = Math.max(0, tu.equip - dmg);
      logEvent(`  💥 海军炮击 (${targetQ},${targetR}) ${tu.name} -${dmg}装备`);
      if (tu.equip <= 0) { removeUnit(tu.id); logEvent(`  💀 ${tu.name} 被炮击摧毁`); }
    } else {
      logEvent(`  💥 海军炮击 (${targetQ},${targetR}) — 该格无敌军`);
    }
  }
  // Immediate org repair
  if (card.effType === 'orgRepair' && targetUnitId) {
    const tu = getUnit(targetUnitId);
    if (tu) { tu.org = Math.min(tu.maxOrg, tu.org + card.effVal); logEvent(`  💊 ${tu.name} +${card.effVal}组织度`); }
  }
  // Unit buff cards: store in unitCardBuffs
  if (card.effType === 'unitAtkBonus' && targetUnitId) {
    if (!unitCardBuffs[targetUnitId]) unitCardBuffs[targetUnitId] = {};
    unitCardBuffs[targetUnitId].atkBonus = (unitCardBuffs[targetUnitId].atkBonus||0) + card.effVal;
  }
  if (card.effType === 'unitMovBonus' && targetUnitId) {
    if (!unitCardBuffs[targetUnitId]) unitCardBuffs[targetUnitId] = {};
    unitCardBuffs[targetUnitId].movBonus = (unitCardBuffs[targetUnitId].movBonus||0) + card.effVal;
  }
  if (card.effType === 'unitDefBonus' && targetUnitId) {
    if (!unitCardBuffs[targetUnitId]) unitCardBuffs[targetUnitId] = {};
    unitCardBuffs[targetUnitId].defBonus = (unitCardBuffs[targetUnitId].defBonus||0) + card.effVal;
  }
  if (card.effType === 'supplyImmune' && targetUnitId) {
    if (!unitCardBuffs[targetUnitId]) unitCardBuffs[targetUnitId] = {};
    unitCardBuffs[targetUnitId].supplyImmune = card.effVal; // turns remaining
  }

  // Remove card from hand
  hand.splice(idx, 1);
  logEvent(`🃏 ${player===PLAYER.UK?'英军':'德军'} 使用: ${card.icon} ${card.name}`);
  updateAll();
  return true;
}
window.playCard = playCard;

function discardCard(player, cardUid) {
  const hand = playerCards[player];

    logEvent(`🃏 ${player===PLAYER.UK?'英军':'德军'} 弃牌: ${card.icon} ${card.name}`);

// Apply active card effects to combat/supply/movement
function hasActiveEffect(player, effType) {

}
function getActiveEffectVal(player, effType) {
  let total = 0;
  for (let e of playerActiveCards[player]) {

function startDraftForPlayer(player, callback) {
  const cards = [drawTacticalCard(player), drawTacticalCard(player)];

  const c1 = playerCards[player].pop();
  const c2 = playerCards[player].pop();

  html += `<p style="color:#aaa;font-size:12px">选一张留下，另一张给对面</p>`;
  html += `<button class="btn-secondary reinforce-btn" onclick="draftPick(${player},0)" style="display:block;width:100%;margin:4px 0;text-align:left;padding:8px 12px;font-size:12px">`;
  html += `${c1.icon} <b>${c1.name}</b><br><span style="color:#888;font-size:10px">${c1.desc}</span></button>`;
  html += `<button class="btn-secondary reinforce-btn" onclick="draftPick(${player},1)" style="display:block;width:100%;margin:4px 0;text-align:left;padding:8px 12px;font-size:12px">`;

  modal.style.display = 'flex';

  // Store draft state
  draftMode = {player, cards:[c1,c2], callback};
}
window.draftPick = function(player, pickIdx) {
  if (!draftMode) return;
  const {cards, callback} = draftMode;
  const kept = cards[pickIdx];
  const given = cards[1 - pickIdx];
  const opponent = player === PLAYER.UK ? PLAYER.GERMANY : PLAYER.UK;

  // Keep selected
  playerCards[player].push(kept);
  // Give other to opponent
  playerCards[opponent].push(given);
  logEvent(`🃏 ${player===PLAYER.UK?'英军':'德军'} 留下 ${kept.icon}${kept.name}，将 ${given.icon}${given.name} 交给对方`);

  document.getElementById('modal').style.display = 'none';
  draftMode = null;

  if (callback) callback();
};

// Clean up card effects at end of turn
function clearTurnCards() {
  playerActiveCards = {1:[], 2:[]};
  // Decrement supplyImmune counters
  for (let uid in unitCardBuffs) {
    if (unitCardBuffs[uid].supplyImmune) {
      unitCardBuffs[uid].supplyImmune--;
      if (unitCardBuffs[uid].supplyImmune <= 0) delete unitCardBuffs[uid].supplyImmune;
    }
    // Clear turn-only buffs
    delete unitCardBuffs[uid].movBonus;
    delete unitCardBuffs[uid].defBonus;
    delete unitCardBuffs[uid].atkBonus;
  }
}

// ==============================
//  MAP INIT
// ==============================
function initMap() {
  hexGrid = [];
  for (let r = 0; r < ROWS; r++) {
    hexGrid[r] = [];
    for (let q = 0; q < COLS; q++) {
      const ch = MAP_DATA[r][q];
      const isUpper = ch === ch.toUpperCase() && ch !== ch.toLowerCase();
      const lowerCh = ch.toLowerCase();
      const t = T_BY_CH[lowerCh] || TERRAIN.SEA;
      const road = isUpper && !t.imp;
      let owner = PLAYER.NONE;
      // Territory determined by nearest CP owner (set below)
      const hasForest = FOREST_DATA[r] && FOREST_DATA[r][q] === '1';
      hexGrid[r][q] = {q, r, terrain:t, road, forest:hasForest, owner, unitId:null, supplyLevel:0};
    }
  }
  capturePoints = CAPTURE_POINTS.map(cp=>({...cp}));
  // Spread ownership around each CP (2-hex radius)
  for (let cp of capturePoints) {
    const h = getHex(cp.q, cp.r);
    if (h) h.owner = cp.startOwner;
    for (let n of hexNeighbors(cp.q, cp.r)) {
      const nh = getHex(n.q, n.r);
      if (nh && !nh.terrain.imp) nh.owner = cp.startOwner;
    }
    // Second ring
    const visited = new Set([hexKey(cp.q, cp.r)]);
    for (let n of hexNeighbors(cp.q, cp.r)) visited.add(hexKey(n.q, n.r));
    for (let n of hexNeighbors(cp.q, cp.r)) {
      for (let n2 of hexNeighbors(n.q, n.r)) {
        const nk = hexKey(n2.q, n2.r);
        if (visited.has(nk)) continue;
        visited.add(nk);
        const nh = getHex(n2.q, n2.r);
        if (nh && !nh.terrain.imp) nh.owner = cp.startOwner;
      }
    }
  }
}

function getSupplyValue(player) {
  let total = 0;
  for (let cp of capturePoints) {
    const h = getHex(cp.q, cp.r);
    if (!h || h.owner !== player) continue;
    total += cp.supply;
    // Add special effect supply bonus
    const e = getCPEffect(cp);
    if (e && e.supplyBonus) total += e.supplyBonus;
  }
  return total;
}

function getControlledCPs(player) {
  return capturePoints.filter(cp=>{
    const h = getHex(cp.q, cp.r);
    return h && h.owner === player;
  }).length;
}

// ==============================
//  UNIT SYSTEM
// ==============================
function createUnit(typeId, owner, q, r, name, opts) {
  const type = UNIT_TYPES[typeId];
  const id = 'u' + (unitIdCounter++);
  // Italian units: lower organization (historically poor morale)
  const isItalian = opts && opts.nation === 'ita';
  const maxOrg = isItalian ? Math.floor(type.org * 0.60) : type.org;
  const unit = {
    id, typeId, owner, q, r,
    name: name || type.name,
    equip: type.equip, maxEquip: type.equip,
    org: maxOrg, maxOrg: maxOrg,
    hasMoved: false, hasFought: false,
    isSupplied: true,
    routed: false,         // rout status
    order: null,
    nation: (opts && opts.nation) || null,
  };
  units[id] = unit;
  const h = getHex(q, r);
  if (h) h.unitId = id;
  return unit;
}

function getUnitAt(q, r) {
  const h = getHex(q, r);
  return h && h.unitId ? units[h.unitId] : null;
}

function getUnit(unitId) {
  return units[unitId] || null;
}

function removeUnit(unitId) {
  const u = units[unitId];
  if (!u) return;
  const h = getHex(u.q, u.r);
  if (h && h.unitId === unitId) h.unitId = null;
  delete units[unitId];
}

function getUnitType(unit) {
  return UNIT_TYPES[unit.typeId];
}

function getReinfCost(typeId) {
  return REINF_COST[typeId] || 2;
}

function initUnits() {
  units = {};
  unitIdCounter = 1;
  for (let bu of BRITISH_UNITS) createUnit(bu.type, PLAYER.UK, bu.q, bu.r, bu.name, {nation: bu.nation || null});
  for (let gu of GERMAN_UNITS) createUnit(gu.type, PLAYER.GERMANY, gu.q, gu.r, gu.name, {nation: gu.nation || null});
  unitOrders = {};
  reinfPoints = {1:0, 2:0};
}

// ==============================
//  PATHFINDING (A*)
// ==============================
function getMoveCost(q, r, unit, fromQ, fromR) {
  const h = getHex(q, r);
  if (!h || h.terrain.imp) return 99;
  const targetUnit = getUnitAt(q, r);
  if (targetUnit && targetUnit.owner !== unit.owner) return 99;
  let cost = h.road ? 0.5 : h.terrain.mc;
  // River edge crossing penalty: +2 when crossing a river line between hexes
  if (fromQ !== undefined && fromR !== undefined) {
    if (hasRiverEdge(fromQ, fromR, q, r) && !hasActiveEffect(unit.owner, 'riverRoad')) {
      cost += 2;
    }
  }
  if (h.forest) cost += 1;  // forest adds +1 move cost to any terrain
  // Special: Caltagirone road hub — if owner controls it, all move costs -0.5 (min 0.5)
  const caltCP = capturePoints.find(cp=>cp.effect==='caltagirone');
  if (caltCP) {
    const caltH = getHex(caltCP.q, caltCP.r);
    if (caltH && caltH.owner === unit.owner) cost = Math.max(0.5, cost - 0.5);
  }
  const ut = getUnitType(unit);
  if (!ut.noZOC) {
    const enemies = hexNeighbors(q,r).filter(n=>{
      const u2 = getUnitAt(n.q,n.r);
      return u2 && u2.owner !== unit.owner;
    });
    if (enemies.length > 0) cost += 1;
  }
  return cost;
}

function findPath(fromQ, fromR, toQ, toR, unit) {
  if (!isValidHex(fromQ, fromR) || !isValidHex(toQ, toR)) return null;
  const targetUnit = getUnitAt(toQ, toR);
  if (targetUnit && targetUnit.owner === unit.owner && !(fromQ===toQ && fromR===toR)) return null;

  const startKey = hexKey(fromQ, fromR);
  const endKey = hexKey(toQ, toR);
  if (startKey === endKey) return [{q:toQ, r:toR}];

  const openSet = new Map();
  const cameFrom = new Map();
  const gScore = new Map();
  const fScore = new Map();

  gScore.set(startKey, 0);
  fScore.set(startKey, hexDistance(fromQ, fromR, toQ, toR));
  openSet.set(startKey, fScore.get(startKey));

  while (openSet.size > 0) {
    let currentKey = null, lowestF = Infinity;
    for (let [k, v] of openSet) { if (v < lowestF) { lowestF = v; currentKey = k; } }
    if (currentKey === endKey) break;
    openSet.delete(currentKey);
    const [cq, cr] = currentKey.split(',').map(Number);

    for (let n of hexNeighbors(cq, cr)) {
      const nk = hexKey(n.q, n.r);
      const cost = getMoveCost(n.q, n.r, unit, cq, cr);
      if (cost >= 99) continue;
      const nu = getUnitAt(n.q, n.r);
      if (nu && nu.owner !== unit.owner && nk !== endKey) continue;
      if (nu && nu.owner === unit.owner && nk !== endKey) continue;

      const tentG = (gScore.get(currentKey)||0) + cost;
      if (tentG < (gScore.get(nk)||Infinity)) {
        cameFrom.set(nk, currentKey);
        gScore.set(nk, tentG);
        fScore.set(nk, tentG + hexDistance(n.q, n.r, toQ, toR));
        openSet.set(nk, fScore.get(nk));
      }
    }
  }

  if (!cameFrom.has(endKey)) return null;
  const path = [];
  let ck = endKey;
  while (ck && ck !== startKey) {
    const [cq, cr] = ck.split(',').map(Number);
    path.unshift({q:cq, r:cr});
    ck = cameFrom.get(ck);
  }
  path.unshift({q:fromQ, r:fromR});
  return path;
}

// Calculate all hexes a unit can reach within its movement points (BFS)
// movMultiplier: 1.0=normal, 2.0=forced march/retreat, 0.5=advance & fire
function getReachableHexes(unit, movMultiplier = 1.0) {
  const reachable = new Map(); // key -> remaining moves (only for stoppable hexes)
  const visited = new Set();   // key -> visited (includes pass-through hexes)
  const startKey = hexKey(unit.q, unit.r);
  const ut = getUnitType(unit);
  let maxMoves = Math.floor(ut.mov * movMultiplier);
  // Tactical card: unit movement bonus (forced march order)
  if (unitCardBuffs[unit.id] && unitCardBuffs[unit.id].movBonus) {
    maxMoves += unitCardBuffs[unit.id].movBonus;
  }
  reachable.set(startKey, maxMoves);
  visited.add(startKey);

  const queue = [{q:unit.q, r:unit.r, movesLeft:maxMoves}];
  while (queue.length > 0) {
    const {q, r, movesLeft} = queue.shift();
    for (let n of hexNeighbors(q, r)) {
      const nk = hexKey(n.q, n.r);
      if (visited.has(nk)) continue;
      visited.add(nk);
      const targetUnit = getUnitAt(n.q, n.r);
      // Enemy-occupied hexes are blocked (unless it's the start hex)
      if (targetUnit && targetUnit.owner !== unit.owner) continue;
      const cost = getMoveCost(n.q, n.r, unit, q, r);
      if (cost >= 99) continue;
      const remaining = movesLeft - cost;
      if (remaining >= 0) {
        // Can stop here only if empty (not occupied by friendly unit)
        if (!targetUnit || targetUnit.owner !== unit.owner) {
          reachable.set(nk, remaining);
        }
        // Continue BFS from this hex regardless (pass through friendly units)
        if (remaining > 0) {
          queue.push({q:n.q, r:n.r, movesLeft:remaining});
        }
      }
    }
  }
  return reachable;
}

// ==============================
//  RENDERING
// ==============================
function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  const w = wrap.clientWidth || window.innerWidth - 240;
  const h = wrap.clientHeight || window.innerHeight - 100;
  canvas.width = Math.max(800, w);
  canvas.height = Math.max(600, h);
}
window.addEventListener('resize', resizeCanvas);

function worldToScreen(wx, wy) {
  return {x: wx * zoom + camX + canvas.width/2, y: wy * zoom + camY + canvas.height/2};
}
function screenToWorld(sx, sy) {
  return {x: (sx - camX - canvas.width/2) / zoom, y: (sy - camY - canvas.height/2) / zoom};
}

function getViewer() {
  // Return which player's perspective we're viewing from
  // During resolve phase, show everything (PLAYER.NONE)
  if (currentPhase === PHASE.RESOLVE) return PLAYER.NONE;
  return currentPlayer;
}

function drawHex(ctx, q, r) {
  const h = getHex(q, r);
  if (!h) return;
  const viewer = getViewer();
  const isSea = h.terrain.imp;
  const visible = viewer === PLAYER.NONE || isHexVisible(q, r, viewer);
  const explored = viewer === PLAYER.NONE || isHexExplored(q, r, viewer);

  const wc = hexToPixel(q, r);
  const wcorners = hexCorners(wc.x, wc.y);
  const sc = wcorners.map(c=>worldToScreen(c.x, c.y));
  const center = worldToScreen(wc.x, wc.y);

  ctx.beginPath();
  ctx.moveTo(sc[0].x, sc[0].y);
  for (let i = 1; i < 6; i++) ctx.lineTo(sc[i].x, sc[i].y);
  ctx.closePath();

  // FOW: binary — visible (normal) or dimmed (65% brightness)
  let fillColor = h.terrain.color;
  if (!visible) {
    fillColor = darkenColor(h.terrain.color, 0.65);
  }

  ctx.fillStyle = fillColor;
  ctx.fill();

  // Forest always visible (permanent terrain feature)
  if (h.forest) {
    ctx.fillStyle = visible ? 'rgba(34,139,34,0.55)' : 'rgba(34,139,34,0.30)';
    ctx.beginPath();
    ctx.arc(center.x, center.y - 3*zoom, Math.max(3, HEX_SIZE*0.22*zoom), 0, Math.PI*2);
    ctx.fill();
  }
  // Road — only when visible
  if (visible) {
    if (h.road) {
      // Draw road lines to adjacent road hexes
      ctx.strokeStyle = 'rgba(180,140,100,0.70)';
      ctx.lineWidth = Math.max(2.5, 4 * zoom);
      ctx.beginPath();
      for (let n of hexNeighbors(q, r)) {
        const nh = getHex(n.q, n.r);
        if (nh && nh.road) {
          const nc = hexToPixel(n.q, n.r);
          const ns = worldToScreen(nc.x, nc.y);
          ctx.moveTo(center.x, center.y);
          ctx.lineTo(ns.x, ns.y);
        }
      }
      ctx.stroke();
    }
  }

  // River edges — thick blue lines along hex sides
  if (visible) {
    for (let e of EDGE_DEFS) {
      const nq = q + e.dq, nr = r + e.dr;
      if (hasRiverEdge(q, r, nq, nr)) {
        // Only draw from the lexicographically first hex to avoid double-drawing
        const key = edgeKey(q, r, nq, nr);
        const [fQ, fR] = key.split('|')[0].split(',').map(Number);
        if (q === fQ && r === fR) {
          ctx.beginPath();
          ctx.moveTo(sc[e.c1].x, sc[e.c1].y);
          ctx.lineTo(sc[e.c2].x, sc[e.c2].y);
          ctx.strokeStyle = '#2a5a7a';
          ctx.lineWidth = Math.max(3, 4 * zoom);
          ctx.stroke();
        }
      }
    }
  }

  // Hex border
  ctx.strokeStyle = visible ? 'rgba(255,255,255,0.10)' : 'rgba(255,255,255,0.05)';
  ctx.lineWidth = Math.max(0.8, 1.0 * zoom);
  ctx.stroke();

  // Supply overlay — only visible hexes and for current player
  if (visible && h.supplyLevel > 0.2 && h.owner === currentPlayer) {
    ctx.fillStyle = `rgba(255,255,255,${Math.min(0.25, h.supplyLevel*0.15)})`;
    ctx.fill();
  }

  // Capture point marker — only on visible hexes
  if (visible) {
    const cp = capturePoints.find(c=>c.q===q && c.r===r);
    if (cp) {
      const isCity = cp.type === 'city' || cp.supply >= 4;
      const owner = h.owner;
      const isUK = owner === PLAYER.UK;
      const isDE = owner === PLAYER.GERMANY;
      const ownerCol = isUK ? '#2980b9' : isDE ? '#c0392b' : '#555';

      if (isCity) {
        // City: large diamond marker with glow
        const dsz = 8 * zoom;
        ctx.fillStyle = ownerCol;
        ctx.shadowColor = isUK ? 'rgba(41,128,185,0.7)' : isDE ? 'rgba(192,57,43,0.7)' : 'rgba(100,100,100,0.5)';
        ctx.shadowBlur = 6 * zoom;
        ctx.beginPath();
        ctx.moveTo(center.x, center.y - dsz);
        ctx.lineTo(center.x + dsz, center.y);
        ctx.lineTo(center.x, center.y + dsz);
        ctx.lineTo(center.x - dsz, center.y);
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;
        // White outline
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1.5 * zoom;
        ctx.stroke();
        // Star icon inside
        if (zoom > 0.4) {
          ctx.fillStyle = '#fff';
          ctx.font = `bold ${Math.max(8, 10*zoom)}px sans-serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('★', center.x, center.y);
        }
      } else {
        // Town: rounded square marker
        const tsz = 5.5 * zoom;
        const r = 1.5 * zoom;
        ctx.fillStyle = ownerCol;
        ctx.shadowColor = isUK ? 'rgba(41,128,185,0.4)' : isDE ? 'rgba(192,57,43,0.4)' : 'rgba(100,100,100,0.3)';
        ctx.shadowBlur = 3 * zoom;
        ctx.beginPath();
        ctx.moveTo(center.x - tsz + r, center.y - tsz);
        ctx.lineTo(center.x + tsz - r, center.y - tsz);
        ctx.arcTo(center.x + tsz, center.y - tsz, center.x + tsz, center.y - tsz + r, r);
        ctx.lineTo(center.x + tsz, center.y + tsz - r);
        ctx.arcTo(center.x + tsz, center.y + tsz, center.x + tsz - r, center.y + tsz, r);
        ctx.lineTo(center.x - tsz + r, center.y + tsz);
        ctx.arcTo(center.x - tsz, center.y + tsz, center.x - tsz, center.y + tsz - r, r);
        ctx.lineTo(center.x - tsz, center.y - tsz + r);
        ctx.arcTo(center.x - tsz, center.y - tsz, center.x - tsz + r, center.y - tsz, r);
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = 'rgba(255,255,255,0.8)';
        ctx.lineWidth = 1 * zoom;
        ctx.stroke();
      }
    }
  }
}

function drawUnit(ctx, unit) {
  const wp = hexToPixel(unit.q, unit.r);
  const s = worldToScreen(wp.x, wp.y);
  const ut = getUnitType(unit);
  const z = Math.max(0.5, zoom);

  // NATO rectangular counter — ~70% of hex, leaving terrain visible around edges
  const cw = HEX_SIZE * 1.6 * z;   // counter width
  const ch = HEX_SIZE * 0.9 * z;   // counter height
  const cx = s.x - cw/2;
  const cy = s.y - ch/2;
  const pad = 1.5 * z;

  // Counter background (country color)
  ctx.fillStyle = unit.owner===PLAYER.UK?'#1a3a5e':'#3a1a1a';
  ctx.fillRect(cx, cy, cw, ch);

  // Border — color indicates supply status; rout overrides
  ctx.strokeStyle = unit.isSupplied ? '#556' : '#e74c3c';
  ctx.lineWidth = Math.max(1, 1.5 * z);
  ctx.strokeRect(cx, cy, cw, ch);

  // Routed indicator: flashing red border
  if (unit.routed) {
    const flash = Math.sin(Date.now() / 200) * 0.4 + 0.6; // oscillate 0.2-1.0
    ctx.strokeStyle = `rgba(255,40,40,${flash})`;
    ctx.lineWidth = Math.max(2, 3 * z);
    ctx.strokeRect(cx - 1, cy - 1, cw + 2, ch + 2);
  }

  // Top section: NATO icon + unit type name
  const topH = ch * 0.40;
  ctx.fillStyle = unit.owner===PLAYER.UK?'#1a5276':'#641e16';
  ctx.fillRect(cx, cy, cw, topH);

  // NATO symbol (left side of top section)
  ctx.fillStyle = ut.color;
  ctx.font = `bold ${Math.max(8, 12*z)}px sans-serif`;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(ut.icon, cx + pad*2, cy + topH/2);

  // Unit type abbreviation (right side of top section)
  ctx.fillStyle = '#ddd';
  ctx.font = `${Math.max(6, 9*z)}px sans-serif`;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  ctx.fillText(ut.id.toUpperCase(), cx + cw - pad*2, cy + topH/2);

  // Equipment bar (green)
  const barH = Math.max(2, ch * 0.18);
  const barY1 = cy + topH + pad;
  const barW = cw - pad*4;
  const barX = cx + pad*2;
  ctx.fillStyle = '#222';
  ctx.fillRect(barX, barY1, barW, barH);
  const equipPct = unit.equip / unit.maxEquip;
  ctx.fillStyle = equipPct > 0.6 ? '#27ae60' : equipPct > 0.3 ? '#f39c12' : '#e74c3c';
  ctx.fillRect(barX, barY1, barW * equipPct, barH);

  // Organization bar (blue)
  const barY2 = barY1 + barH + 1*z;
  ctx.fillStyle = '#222';
  ctx.fillRect(barX, barY2, barW, barH);
  const orgPct = unit.org / unit.maxOrg;
  ctx.fillStyle = orgPct > 0.5 ? '#2980b9' : orgPct > 0.2 ? '#f39c12' : '#e74c3c';
  ctx.fillRect(barX, barY2, barW * orgPct, barH);

  // Bottom: unit size indicator
  const botY = barY2 + barH + 1*z;
  ctx.fillStyle = '#999';
  ctx.font = `${Math.max(5, 7*z)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('II', cx + cw/2, (botY + cy + ch)/2);  // II = battalion

  // Order marker (small triangle at top-right)
  if (unit.order) {
    const showOrder = currentPhase === PHASE.RESOLVE ||
      (currentPhase === PHASE.ORDERS_UK && currentPlayer === PLAYER.UK) ||
      (currentPhase === PHASE.ORDERS_DE && currentPlayer === PLAYER.GERMANY);
    if (showOrder) {
      const col = unit.order.type==='move'?'#2ecc71':unit.order.type==='attack'?'#e74c3c':'#f39c12';
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.moveTo(cx + cw, cy);
      ctx.lineTo(cx + cw - 6*z, cy);
      ctx.lineTo(cx + cw, cy + 6*z);
      ctx.fill();
    }
  }
}

function shadeColor(color, percent) {
  const num = parseInt(color.replace('#',''), 16);
  const amt = Math.round(2.55 * percent);
  const R = Math.min(255, Math.max(0, (num>>16) + amt));
  const G = Math.min(255, Math.max(0, (num>>8 & 0xFF) + amt));
  const B = Math.min(255, Math.max(0, (num & 0xFF) + amt));
  return '#' + (0x1000000 + R*0x10000 + G*0x100 + B).toString(16).slice(1);
}

// Darken a color by scaling RGB channels (0.0-1.0), preserves hue
function darkenColor(hex, scale) {
  const num = parseInt(hex.replace('#',''), 16);
  let R = (num>>16) & 0xFF, G = (num>>8) & 0xFF, B = num & 0xFF;
  R = Math.round(R * scale);
  G = Math.round(G * scale);
  B = Math.round(B * scale);
  return '#' + (0x1000000 + R*0x10000 + G*0x100 + B).toString(16).slice(1);
}

function render() {
  if (canvas.width < 10 || canvas.height < 10) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Ocean background (different from sea hex #1a3a5c)
  ctx.fillStyle = '#0e2240';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Accurate frustum culling — use pixelToHex on all 4 screen corners
  const corners = [
    screenToWorld(0, 0),
    screenToWorld(canvas.width, 0),
    screenToWorld(0, canvas.height),
    screenToWorld(canvas.width, canvas.height)
  ].map(w => pixelToHex(w.x, w.y));

  const qMin = Math.max(0, Math.min(...corners.map(c=>c.q)) - 2);
  const qMax = Math.min(COLS-1, Math.max(...corners.map(c=>c.q)) + 2);
  const rMin = Math.max(0, Math.min(...corners.map(c=>c.r)) - 2);
  const rMax = Math.min(ROWS-1, Math.max(...corners.map(c=>c.r)) + 2);

  for (let r = rMin; r <= rMax; r++) {
    for (let q = qMin; q <= qMax; q++) {
      drawHex(ctx, q, r);
    }
  }

  // Deployable range blue border (deployment phase)
  if ((currentPhase === PHASE.DEPLOY_UK || currentPhase === PHASE.DEPLOY_DE)) {
    const pp = getPhasePlayer();
    if ((reinfPoints[pp] || 0) > 0) {
      const deployable = new Set();
      for (let r = rMin; r <= rMax; r++) {
        for (let q = qMin; q <= qMax; q++) {
          const h = getHex(q, r);
          if (h && h.owner === pp && !h.unitId) deployable.add(hexKey(q, r));
        }
      }
      if (deployable.size > 0) {
        const lineW = Math.max(2.5, 3.5 * zoom);
        for (let key of deployable) {
          const [dq, dr] = key.split(',').map(Number);
          const wp = hexToPixel(dq, dr);
          const wcorners = hexCorners(wp.x, wp.y);
          const sc = wcorners.map(c => worldToScreen(c.x, c.y));
          for (let e of EDGE_DEFS) {
            const nk = hexKey(dq + e.dq, dr + e.dr);
            if (!deployable.has(nk)) {
              ctx.beginPath();
              ctx.moveTo(sc[e.c1].x, sc[e.c1].y);
              ctx.lineTo(sc[e.c2].x, sc[e.c2].y);
              ctx.strokeStyle = '#3498db';
              ctx.lineWidth = lineW;
              ctx.setLineDash([5*zoom, 3*zoom]);
              ctx.stroke();
              ctx.setLineDash([]);
            }
          }
        }
      }
    }
  }

  // Draw movement/attack range preview for selected unit (orders phase only)
  if (selectedUnitId && !pendingOrder && (currentPhase===PHASE.ORDERS_UK||currentPhase===PHASE.ORDERS_DE)) {
    const selUnit = getUnit(selectedUnitId);
    if (selUnit && selUnit.owner === getPhasePlayer()) {
      const selType = getUnitType(selUnit);
      // ---- ATTACK: highlight enemy units within weapon range ----
      if (selectedActionType === ACTION_TYPE.ATTACK) {
        const rng = selType.rng || 1;
        for (let id in units) {
          const eu = units[id];
          if (eu.owner === selUnit.owner || eu.equip <= 0) continue;
          const d = hexDistance(selUnit.q, selUnit.r, eu.q, eu.r);
          if (d <= rng) {
            const wp = hexToPixel(eu.q, eu.r);
            const wcorners = hexCorners(wp.x, wp.y);
            const sc = wcorners.map(c=>worldToScreen(c.x, c.y));
            ctx.beginPath();
            ctx.moveTo(sc[0].x, sc[0].y);
            for (let i=1;i<6;i++) ctx.lineTo(sc[i].x, sc[i].y);
            ctx.closePath();
            ctx.strokeStyle = '#e74c3c';
            ctx.lineWidth = Math.max(2.5, 3.5 * zoom);
            ctx.setLineDash([4*zoom, 2*zoom]);
            ctx.stroke();
            ctx.setLineDash([]);
            // Crosshair inside
            const center = worldToScreen(wp.x, wp.y);
            const cr = HEX_SIZE * 0.35 * zoom;
            ctx.strokeStyle = 'rgba(231,76,60,0.55)';
            ctx.lineWidth = Math.max(1.5, 2 * zoom);
            ctx.beginPath(); ctx.moveTo(center.x-cr, center.y-cr); ctx.lineTo(center.x+cr, center.y+cr); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(center.x+cr, center.y-cr); ctx.lineTo(center.x-cr, center.y+cr); ctx.stroke();
          }
        }
      } else {
        // ---- MOVE / FORCED MARCH / RAPID WITHDRAW / ADVANCE FIRE: show movement range ----
        const movMult = selectedActionType === ACTION_TYPE.FORCED_MARCH || selectedActionType === ACTION_TYPE.RAPID_WITHDRAW ? 2.0 :
                         selectedActionType === ACTION_TYPE.ADVANCE_FIRE ? 0.5 : 1.0;
        // Stroke colors per action type
        const edgeColors = {
          [ACTION_TYPE.MOVE]: '#2ecc71',           // green
          [ACTION_TYPE.FORCED_MARCH]: '#f39c12',   // orange
          [ACTION_TYPE.RAPID_WITHDRAW]: '#3498db', // blue
          [ACTION_TYPE.ADVANCE_FIRE]: '#e74c3c',   // red
        };
        const edgeCol = edgeColors[selectedActionType] || edgeColors[ACTION_TYPE.MOVE];
        const reachable = getReachableHexes(selUnit, movMult);
        // Build a Set for fast boundary check
        const reachableSet = new Set();
        for (let [key] of reachable) reachableSet.add(key);
        const lineW = Math.max(2.5, 3.5 * zoom);
        for (let [key] of reachable) {
          const [rq, rr] = key.split(',').map(Number);
          // Skip the unit's own hex — draw boundary around the rest
          if (rq === selUnit.q && rr === selUnit.r) continue;
          const wp = hexToPixel(rq, rr);
          const wcorners = hexCorners(wp.x, wp.y);
          const sc = wcorners.map(c=>worldToScreen(c.x, c.y));
          for (let e of EDGE_DEFS) {
            const nk = hexKey(rq + e.dq, rr + e.dr);
            if (!reachableSet.has(nk)) {
              // External edge — draw bold line
              ctx.beginPath();
              ctx.moveTo(sc[e.c1].x, sc[e.c1].y);
              ctx.lineTo(sc[e.c2].x, sc[e.c2].y);
              ctx.strokeStyle = edgeCol;
              ctx.lineWidth = lineW;
              ctx.stroke();
            }
          }
        }
      }
    }
  }

  // Draw pending move path
  if (pendingOrder && pendingOrder.type==='move' && pendingOrder.path && pendingOrder.path.length > 1) {
    const path = pendingOrder.path;
    ctx.beginPath();
    for (let i = 0; i < path.length; i++) {
      const wp = hexToPixel(path[i].q, path[i].r);
      const s = worldToScreen(wp.x, wp.y);
      if (i===0) ctx.moveTo(s.x, s.y);
      else ctx.lineTo(s.x, s.y);
    }
    ctx.strokeStyle = '#2ecc71';
    ctx.lineWidth = 3*zoom;
    ctx.setLineDash([6*zoom, 3*zoom]);
    ctx.stroke();
    ctx.setLineDash([]);
    // Arrow at end
    const last = path[path.length-1];
    const lwp = hexToPixel(last.q, last.r);
    const lp = worldToScreen(lwp.x, lwp.y);
    ctx.fillStyle = '#2ecc71';
    ctx.beginPath(); ctx.arc(lp.x, lp.y, 4*zoom, 0, Math.PI*2); ctx.fill();
  }

  // Pending attack target highlight
  if (pendingOrder && pendingOrder.type==='attack') {
    const twp = hexToPixel(pendingOrder.toQ, pendingOrder.toR);
    const ts = worldToScreen(twp.x, twp.y);
    ctx.strokeStyle = '#e74c3c';
    ctx.lineWidth = 3*zoom;
    ctx.setLineDash([4*zoom, 2*zoom]);
    ctx.beginPath(); ctx.arc(ts.x, ts.y, HEX_SIZE*0.7*zoom, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Draw all units (only visible ones)
  const viewer = getViewer();
  for (let id in units) {
    const u = units[id];
    // Always show own units; only show enemy units if they're visible
    if (u.owner === viewer || viewer === PLAYER.NONE || isHexVisible(u.q, u.r, viewer)) {
      drawUnit(ctx, u);
    }
  }

  // Selection highlight
  if (selectedUnitId) {
    const su = getUnit(selectedUnitId);
    if (su) {
      const wp = hexToPixel(su.q, su.r);
      const wcorners = hexCorners(wp.x, wp.y);
      const sc = wcorners.map(c=>worldToScreen(c.x, c.y));
      ctx.beginPath();
      ctx.moveTo(sc[0].x, sc[0].y);
      for (let i=1;i<6;i++) ctx.lineTo(sc[i].x, sc[i].y);
      ctx.closePath();
      ctx.strokeStyle = '#f1c40f';
      ctx.lineWidth = 3*zoom;
      ctx.setLineDash([3*zoom, 2*zoom]);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }
}

// ==============================
//  INPUT
// ==============================
function getHexFromEvent(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  const w = screenToWorld(sx, sy);
  return pixelToHex(w.x, w.y);
}

canvas.addEventListener('mousedown', function(e) {
  if (e.button === 0) {
    const hq = getHexFromEvent(e);
    if (hq && isValidHex(hq.q, hq.r)) {
      // Check if it's this player's turn
      if (isMyTurn()) handleHexClick(hq.q, hq.r);
      else logEvent('⚠ 现在是对方回合，请等待');
    }
  } else if (e.button === 1 || e.button === 2) {
    isDragging = true;
    dragStartX = e.clientX; dragStartY = e.clientY;
    dragCamX = camX; dragCamY = camY;
    document.getElementById('canvas-wrap').classList.add('dragging');
    e.preventDefault();
  }
});

canvas.addEventListener('mousemove', function(e) {
  mouseX = e.clientX; mouseY = e.clientY;
  if (isDragging) {
    camX = dragCamX + (e.clientX - dragStartX);
    camY = dragCamY + (e.clientY - dragStartY);
  }
  const hq = getHexFromEvent(e);
  if (hq && isValidHex(hq.q, hq.r)) {
    const h = getHex(hq.q, hq.r);
    const u = getUnitAt(hq.q, hq.r);
    const cp = capturePoints.find(c=>c.q===hq.q && c.r===hq.r);
    let tip = `(${hq.q},${hq.r}) ${h.terrain.name}`;
    if (h.road) tip += ' +道路';
    if (cp) {
      tip += `\n📍 ${cp.name} 补给:${cp.supply}`;
      const e = getCPEffect(cp);
      if (e && e.name) tip += `\n⚡ ${e.name}`;
    }
    if (h.supplyLevel > 0.1) tip += `\n补给水平: ${Math.round(h.supplyLevel*100)}%`;
    if (u) {
      const viewer = getViewer();
      // Only show enemy unit details if visible
      if (u.owner === viewer || viewer === PLAYER.NONE || isHexVisible(hq.q, hq.r, viewer)) {
        const ut = getUnitType(u);
        tip += `\n${u.owner===PLAYER.UK?'🇬🇧':'🇩🇪'} ${u.name}`;
        tip += `\n${ut.icon} ${ut.name} | 装备:${u.equip}/${u.maxEquip} 组织:${u.org}/${u.maxOrg}`;
        if (u.routed) tip += ' [溃退]';
        if (u.order) tip += `\n📋 命令: ${u.order.type==='move'?'移动':'攻击'}→(${u.order.toQ},${u.order.toR})`;
      } else {
        tip += '\n❓ 未知单位 (视野外)';
      }
    }
    showTooltip(e.clientX+12, e.clientY+12, tip);
  } else {
    hideTooltip();
  }
});

canvas.addEventListener('mouseup', function() {
  if (isDragging) { isDragging = false; document.getElementById('canvas-wrap').classList.remove('dragging'); }
});
canvas.addEventListener('wheel', function(e) {
  e.preventDefault();
  const oldZoom = zoom;
  zoom = Math.max(0.55, Math.min(3.0, zoom * (e.deltaY > 0 ? 0.9 : 1.1)));
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  camX = mx - (mx - camX) * (zoom / oldZoom);
  camY = my - (my - camY) * (zoom / oldZoom);
});
canvas.addEventListener('contextmenu', e=>e.preventDefault());

function showTooltip(x, y, text) {
  const tt = document.getElementById('tooltip');
  tt.innerHTML = text.replace(/\n/g,'<br>');
  tt.style.left = x+'px'; tt.style.top = y+'px';
  tt.style.display = 'block';
}
function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }

// ==============================
//  TURN STATE HELPERS
// ==============================
function isMyTurn() {
  if (currentPhase === PHASE.RESOLVE) return false;
  // AI phases: the human cannot interact
  if (isAIPhase()) return false;
  if (currentPhase === PHASE.DEPLOY_UK && currentPlayer === PLAYER.UK) return true;
  if (currentPhase === PHASE.DEPLOY_DE && currentPlayer === PLAYER.GERMANY) return true;
  if (currentPhase === PHASE.ORDERS_UK && currentPlayer === PLAYER.UK) return true;
  if (currentPhase === PHASE.ORDERS_DE && currentPlayer === PLAYER.GERMANY) return true;
  return false;
}

function getPhasePlayer() {
  if (currentPhase === PHASE.DEPLOY_UK || currentPhase === PHASE.ORDERS_UK) return PLAYER.UK;
  if (currentPhase === PHASE.DEPLOY_DE || currentPhase === PHASE.ORDERS_DE) return PLAYER.GERMANY;
  return PLAYER.NONE;
}

// ==============================
//  HANDLE CLICKS
// ==============================
function handleHexClick(q, r) {
  if (currentPhase === PHASE.RESOLVE) return;

  const h = getHex(q, r);
  if (!h || h.terrain.imp) return;

  const clickedUnit = getUnitAt(q, r);
  const phasePlayer = getPhasePlayer();

  // --- CARD TARGETING ---
  if (selectedCardUid) {
    const hand = playerCards[phasePlayer] || [];
    const card = hand.find(c=>c.uid===selectedCardUid);
    if (card) {
      if (card.target === 'unit' && clickedUnit && clickedUnit.owner === phasePlayer) {
        playCard(phasePlayer, selectedCardUid, clickedUnit.id);
        selectedCardUid = null;
        updateAll();
        return;
      }
      if (card.target === 'hex') {
        playCard(phasePlayer, selectedCardUid, null, q, r);
        selectedCardUid = null;
        updateAll();
        return;
      }
      if (card.target === 'unit' && (!clickedUnit || clickedUnit.owner !== phasePlayer)) {
        logEvent('⚠ 请点击己方单位来使用此卡');
        return;
      }
    } else {
      selectedCardUid = null;
    }
  }

  // --- DEPLOY PHASE ---
  if (currentPhase === PHASE.DEPLOY_UK || currentPhase === PHASE.DEPLOY_DE) {
    if (!clickedUnit && h.owner === phasePlayer && reinfPoints[phasePlayer] > 0) {
      showDeployModal(q, r);
    } else if (clickedUnit && h.owner === phasePlayer) {
      logEvent('该格已有单位');
    } else if (h.owner !== phasePlayer) {
      logEvent('只能在己方控制的格子上部署');
    }
    return;
  }

  // --- ORDERS PHASE ---
  if (currentPhase === PHASE.ORDERS_UK || currentPhase === PHASE.ORDERS_DE) {
    if (!selectedUnitId) {
      if (clickedUnit && clickedUnit.owner === phasePlayer) {
        selectUnit(clickedUnit.id);
      }
      return;
    }

    const selUnit = getUnit(selectedUnitId);
    if (!selUnit) { selectedUnitId = null; pendingOrder = null; updateAll(); return; }

    // Click on own unit -> switch selection
    if (clickedUnit && clickedUnit.owner === phasePlayer) {
      selectUnit(clickedUnit.id);
      return;
    }

    // Click on enemy unit → depends on selected action type
    if (clickedUnit && clickedUnit.owner !== phasePlayer) {
      handleEnemyTarget(selUnit, q, r, clickedUnit, phasePlayer);
      return;
    }

    // Click on empty/friendly hex → depends on selected action type
    if (!clickedUnit || clickedUnit.owner === phasePlayer) {
      if (clickedUnit && clickedUnit.owner === phasePlayer && hexDistance(selUnit.q, selUnit.r, q, r) === 0 &&
          selectedActionType === ACTION_TYPE.MOVE) {
        return; // clicking self during standard move
      }
      handleMoveTarget(selUnit, q, r, clickedUnit, phasePlayer);
    }
  }
}

// Helper: handle clicking on an enemy hex during orders phase
function handleEnemyTarget(selUnit, q, r, clickedUnit, phasePlayer) {
  const selType = getUnitType(selUnit);
  // Attack action: direct attack is always available
  if (selectedActionType === ACTION_TYPE.ATTACK) {
    const dist = hexDistance(selUnit.q, selUnit.r, q, r);
    if (dist <= selType.rng) {
      giveAttackOrder(selUnit, q, r, clickedUnit, ACTION_TYPE.ATTACK);
    } else {
      logEvent('目标超出射程');
    }
    return;
  }
  // Advance & Fire: move adjacent to enemy, then auto-attack
  if (selectedActionType === ACTION_TYPE.ADVANCE_FIRE) {
    const neighbors = hexNeighbors(q, r).filter(n=>{
      const nu = getUnitAt(n.q, n.r);
      return !nu || nu.owner === phasePlayer;
    });
    let bestPath = null, bestLen = 99;
    for (let n of neighbors) {
      const path = findPath(selUnit.q, selUnit.r, n.q, n.r, selUnit);
      if (path && path.length > 0 && path.length < bestLen) {
        bestPath = path; bestLen = path.length;
      }
    }
    if (bestPath && bestLen > 0) {
      const destHex = bestPath[bestPath.length-1];
      // Move order with embedded attack after reaching destination
      pendingOrder = {
        type:'move', actionType:ACTION_TYPE.ADVANCE_FIRE,
        fromQ:selUnit.q, fromR:selUnit.r,
        toQ:destHex.q, toR:destHex.r,
        path: bestPath,
        attackTargetQ: q, attackTargetR: r, attackTargetId: clickedUnit.id
      };
      updateSidebar();
    } else {
      logEvent('无法找到路径接近目标');
    }
    return;
  }
  // Other action types: cannot target enemy directly
  logEvent('请先选择"攻击"或"移动射击"模式来攻击敌军');
}

// Helper: handle clicking on empty/friendly hex during orders phase
function handleMoveTarget(selUnit, q, r, clickedUnit, phasePlayer) {
  const selType = getUnitType(selUnit);
  // Determine movement multiplier
  let movMult = 1.0;
  if (selectedActionType === ACTION_TYPE.FORCED_MARCH || selectedActionType === ACTION_TYPE.RAPID_WITHDRAW) movMult = 2.0;
  if (selectedActionType === ACTION_TYPE.ADVANCE_FIRE) movMult = 0.5;

  // Compute path
  const path = findPath(selUnit.q, selUnit.r, q, r, selUnit);
  if (!path || path.length === 0) {
    logEvent('无法到达目标格');
    return;
  }

  // Switch selection if clicking on own unit nearby
  if (clickedUnit && clickedUnit.owner === phasePlayer && path.length <= 2 && selectedActionType === ACTION_TYPE.MOVE) {
    selectUnit(clickedUnit.id);
    return;
  }

  // Validate movement range (include card movement bonus)
  let maxMoves = Math.floor(selType.mov * movMult);
  if (unitCardBuffs[selUnit.id] && unitCardBuffs[selUnit.id].movBonus) {
    maxMoves += unitCardBuffs[selUnit.id].movBonus;
  }
  let pathCost = 0;
  for (let i = 1; i < path.length; i++) {
    pathCost += getMoveCost(path[i].q, path[i].r, selUnit, path[i-1].q, path[i-1].r);
  }
  if (pathCost > maxMoves + 0.01) {
    logEvent(`移动力不足 (需要${pathCost.toFixed(1)} > ${maxMoves})`);
    return;
  }

  // Rapid withdrawal: validate end hex is further from enemies
  if (selectedActionType === ACTION_TYPE.RAPID_WITHDRAW) {
    const startDist = minDistToEnemy(selUnit.q, selUnit.r, selUnit.owner);
    const endDist = minDistToEnemy(q, r, selUnit.owner);
    if (endDist <= startDist) {
      logEvent('快速撤退必须远离敌军!');
      return;
    }
  }

  // Forward to giveMoveOrder with selected action type
  giveMoveOrder(selUnit, q, r, path, selectedActionType);
}

// Helper: minimum hex distance from (q,r) to any visible enemy unit
function minDistToEnemy(q, r, owner) {
  let minD = 99;
  for (let id in units) {
    const u = units[id];
    if (u.owner === owner || u.equip <= 0) continue;
    const d = hexDistance(q, r, u.q, u.r);
    if (d < minD) minD = d;
  }
  return minD;
}

function selectUnit(unitId) {
  selectedUnitId = unitId;
  pendingOrder = null;
  updateSidebar();
  updateUnitList();
}

function giveMoveOrder(unit, toQ, toR, path, actionType) {
  pendingOrder = {type:'move', actionType:actionType||ACTION_TYPE.MOVE, fromQ:unit.q, fromR:unit.r, toQ, toR, path};
  updateSidebar();
}

function giveAttackOrder(unit, targetQ, targetR, targetUnit, actionType) {
  pendingOrder = {type:'attack', actionType:actionType||ACTION_TYPE.ATTACK, fromQ:unit.q, fromR:unit.r, toQ:targetQ, toR:targetR, targetId:targetUnit.id};
  updateSidebar();
}

function confirmOrder() {
  if (!selectedUnitId || !pendingOrder) return;
  const unit = getUnit(selectedUnitId);
  if (!unit) return;
  const order = {...pendingOrder};
  // Ensure actionType is set
  if (!order.actionType) order.actionType = order.type==='attack' ? ACTION_TYPE.ATTACK : ACTION_TYPE.MOVE;
  unitOrders[selectedUnitId] = order;
  unit.order = order;
  logEvent(`✓ ${unit.name} 命令已确认: ${describeAction(order)}→(${order.toQ},${order.toR})`);
  selectedUnitId = null;
  pendingOrder = null;
  updateAll();
}

function cancelOrder() {
  const uid = selectedUnitId;
  if (uid) {
    delete unitOrders[uid];
    const unit = getUnit(uid);
    if (unit) unit.order = null;
  }
  selectedUnitId = null;
  pendingOrder = null;
  updateAll();
}

// ==============================
//  UI UPDATES
// ==============================
function updateSidebar() {
  const info = document.getElementById('selected-info');
  if (!selectedUnitId) {
    info.innerHTML = '点击地图上的己方单位选中<br>再点击目标格下达命令';
    return;
  }
  const unit = getUnit(selectedUnitId);
  if (!unit) { info.innerHTML = ''; return; }
  const ut = getUnitType(unit);

  let html = `<b>${unit.name}</b>`;
  if (unit.nation === 'ita') html += ` <span style="color:#90c040;font-size:10px">🇮🇹意军</span>`;
  if (unit.routed) html += ` <span style="color:#e74c3c;font-size:10px">⚠溃退</span>`;
  html += `<br>`;
  html += `类型: ${ut.name} ${ut.icon}`;
  if (unit.nation === 'ita') html += ` <span style="color:#aaa;font-size:9px">(士气低落)</span>`;
  html += `<br>`;
  html += `装备: ${unit.equip}/${unit.maxEquip} | 组织: ${unit.org}/${unit.maxOrg}<br>`;
  html += `软攻:${ut.softAtk} 硬攻:${ut.hardAtk} 防御:${ut.def} 移动:${ut.mov} 射程:${ut.rng}<br>`;
  html += `补给: ${unit.isSupplied?'✅':'❌'}`;

  if (unit.order) {
    html += `<br>📋 已下令: ${describeAction(unit.order)}→(${unit.order.toQ},${unit.order.toR})`;
  }
  if (pendingOrder) {
    html += `<br><span style="color:#f1c40f">⏳ 待确认</span>`;
    html += `<br><span style="font-size:9px;color:#888">请在下方面板确认或取消</span>`;
  } else if (!unit.order) {
    html += `<br><span style="font-size:9px;color:#888">操作面板 ↓ 选择行动模式</span>`;
  }
  info.innerHTML = html;
}

function actionBtn(label, type, enabled) {
  const sel = selectedActionType === type ? 'border-color:#e74c3c;background:#2a1a1a' : 'border-color:#444';
  const dis = enabled ? '' : 'opacity:0.4;cursor:not-allowed';
  return `<button onclick="setActionType('${type}')" style="padding:3px 4px;background:#222;color:#ddd;border:2px solid;${sel};${dis}border-radius:4px;cursor:pointer;font-size:10px" ${!enabled?'disabled':''}>${label}</button>`;
}

function describeAction(order) {
  const names = {
    [ACTION_TYPE.MOVE]: '移动', [ACTION_TYPE.FORCED_MARCH]: '急行军',
    [ACTION_TYPE.ADVANCE_FIRE]: '移动射击', [ACTION_TYPE.RAPID_WITHDRAW]: '快速撤退',
    [ACTION_TYPE.ATTACK]: '攻击'
  };
  return names[order.actionType] || '移动';
}

function updateUnitList() {
  const list = document.getElementById('unit-list');
  // During AI phase, show the human player's units (read-only)
  let displayOwner = getPhasePlayer();
  if (isAIPhase()) {
    displayOwner = gameMode === GAME_MODE.UK_VS_AI ? PLAYER.UK : PLAYER.GERMANY;
  }
  const interactive = !isAIPhase();
  let html = '';
  for (let id in units) {
    const u = units[id];
    if (u.owner !== displayOwner) continue;
    const ut = getUnitType(u);
    const sel = id === selectedUnitId ? ' selected' : '';
    const ordered = u.order ? ' ✓' : '';
    const clickHandler = interactive ? `onclick="selectUnit('${id}');updateUnitList()"` : '';
    html += `<div class="unit-card${sel}" ${clickHandler}>`;
    const nationTag = u.nation === 'ita' ? ' 🇮🇹' : '';
    html += `<div class="name">${ut.icon} ${u.name}${nationTag}${ordered}</div>`;
    html += `<div class="stats">装备:${u.equip}/${u.maxEquip} 组织:${u.org}/${u.maxOrg} | ${ut.name}${u.nation==='ita'?' [意军]':''}</div>`;
    html += `<div class="bar-wrap"><div class="bar-fill bar-equip" style="width:${u.equip/u.maxEquip*100}%"></div></div>`;
    html += `<div class="bar-wrap"><div class="bar-fill bar-org" style="width:${u.org/u.maxOrg*100}%"></div></div>`;
    html += `</div>`;
  }
  list.innerHTML = html || '<div style="color:#666;font-size:12px">无单位</div>';

  // Update sidebar title
  const title = document.getElementById('sidebar-title');
  if (isAIPhase()) {
    title.textContent = gameMode === GAME_MODE.UK_VS_AI ? '📋 英军单位 (AI回合)' : '📋 德军单位 (AI回合)';
  } else if (currentPhase === PHASE.DEPLOY_UK || currentPhase === PHASE.ORDERS_UK) {
    title.textContent = '📋 英军单位';
  } else if (currentPhase === PHASE.DEPLOY_DE || currentPhase === PHASE.ORDERS_DE) {
    title.textContent = '📋 德军单位';
  } else {
    title.textContent = '📋 单位列表';
  }

  // Update reinforcement info
  const reinfInfo = document.getElementById('reinf-info');
  if (isAIPhase()) {
    reinfInfo.innerHTML = '<span style="color:#888">🤖 AI思考中...</span>';
  } else {
    const pp = getPhasePlayer();
    const rp = reinfPoints[pp] || 0;
  if ((currentPhase === PHASE.DEPLOY_UK || currentPhase === PHASE.DEPLOY_DE) && rp > 0) {
    reinfInfo.innerHTML = `🪖 可部署兵力点: <b>${rp}</b><br>
      <span style="font-size:9px">步兵:2 | 装甲:5 | 炮兵:4 | 工兵:3 | 侦察:3</span><br>
      <button onclick="buyTacticalCard(${pp})" style="margin-top:3px;padding:3px 8px;background:#8e44ad;color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:10px"
        ${rp >= CARD_BUY_COST ? '' : 'disabled'}>🃏 消耗${CARD_BUY_COST}补给抽卡</button>`;
    } else if (currentPhase === PHASE.DEPLOY_UK || currentPhase === PHASE.DEPLOY_DE) {
      reinfInfo.innerHTML = '🪖 无可用兵力点';
    } else {
      reinfInfo.innerHTML = '';
    }
  }
}

function updateCPSummary() {
  const div = document.getElementById('cp-summary');
  if (!div) return;
  const ukCPs = capturePoints.filter(cp=>{
    const h = getHex(cp.q, cp.r);
    return h && h.owner === PLAYER.UK;
  });
  const deCPs = capturePoints.filter(cp=>{
    const h = getHex(cp.q, cp.r);
    return h && h.owner === PLAYER.GERMANY;
  });
  let html = '<b>🏴 战略点控制</b><br>';
  html += `<span style="color:#85c1e9">🇬🇧 英军: ${ukCPs.length}/${capturePoints.length}</span> `;
  if (ukCPs.length > 0) {
    html += ukCPs.map(cp=>cp.name.split(' ')[0]).join(', ');
    html += '<br>';
  }
  html += `<span style="color:#f1948a">🇩🇪 德军: ${deCPs.length}/${capturePoints.length}</span> `;
  if (deCPs.length > 0) {
    html += deCPs.map(cp=>cp.name.split(' ')[0]).join(', ');
    html += '<br>';
  }
  // Show units without orders during orders phase
  if (currentPhase === PHASE.ORDERS_UK || currentPhase === PHASE.ORDERS_DE) {
    const pp = getPhasePlayer();
    let withOrders = 0, withoutOrders = 0;
    for (let id in units) {
      const u = units[id];
      if (u.owner !== pp) continue;
      if (unitOrders[id]) withOrders++;
      else withoutOrders++;
    }
    html += `<br><span style="color:${withoutOrders>0?'#f39c12':'#2ecc71'}">📋 已下令: ${withOrders} | 未下令: ${withoutOrders}</span>`;
  }
  div.innerHTML = html;
}

function updateCardUI() {
  const list = document.getElementById('card-list');
  const title = document.getElementById('card-title');
  if (!list || !title) return;
  if (isAIPhase()) {
    list.innerHTML = '<span style="color:#555">(AI思考中...)</span>';
    title.textContent = '🃏 战术卡';
    return;
  }
  const pp = getPhasePlayer();
  const hand = playerCards[pp] || [];
  const active = playerActiveCards[pp] || [];
  // Sidebar shows minimal summary — full cards in floating panel
  var activeStr = '';
  if (active.length > 0) {
    activeStr = ' <span style="color:#2ecc71;font-size:9px">生效:' + active.map(function(e){return e.cardIcon;}).join('') + '</span>';
  }
  title.innerHTML = '🃏 战术卡 (' + hand.length + '张)' + activeStr;
  if (hand.length === 0) {
    list.innerHTML = '<span style="color:#555;font-size:9px">浮窗中管理 →</span>';
  } else {
    list.innerHTML = '<span style="font-size:9px;color:#888">' + hand.map(function(c){return c.icon + c.name;}).join(' ') + '</span>';
    if (selectedCardUid) {
      var sc = hand.find(function(c2){return c2.uid===selectedCardUid;});
      if (sc && sc.target !== 'global') {
        list.innerHTML += '<div style="font-size:8px;color:#f1c40f;margin-top:2px">🎯 点' + (sc.target==='unit'?'己方单位':'地图格') + '使用</div>';
      }
    }
  }
}

function selectCard(uid) {
  const pp = getPhasePlayer();
  const hand = playerCards[pp] || [];
  const card = hand.find(c=>c.uid===uid);
  if (!card) return;

  // If already selected, deselect
  if (selectedCardUid === uid) { selectedCardUid = null; updateCardUI(); return; }

  selectedCardUid = uid;

  // For global-effect cards, play immediately
  if (card.target === 'global') {
    playCard(pp, uid);
    selectedCardUid = null;
  }
  updateCardUI();
}
window.selectCard = selectCard;

function quickPlayCard(uid) {
